<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <text x="400" y="35" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="20" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    TIMELINE — ENGINEERING JOURNEY
  </text>

  <!-- Timeline axis -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#334155" stroke-width="2"/>
  <g transform="translate(50, 200)">
    <circle r="6" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">OBSERVATION</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">AI demos are hollow</text>
  </g>

  <g transform="translate(180, 200)">
    <circle r="6" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">INTENT</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Build the OS layer</text>
  </g>

  <g transform="translate(310, 200)">
    <circle r="6" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">MISSION</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Spec-driven orchestration</text>
  </g>

  <g transform="translate(440, 200)">
    <circle r="6" fill="#3B82F6" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">PLANNING</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">CENSA DAG generation</text>
  </g>

  <g transform="translate(570, 200)">
    <circle r="6" fill="#8B5CF6" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">PANANI X</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Sandboxed execution</text>
  </g>

  <g transform="translate(700, 200)">
    <circle r="6" fill="#22C55E" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">ADAPTIVE</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Provider routing</text>
  </g>

  <g transform="translate(830, 200)">
    <circle r="6" fill="#EF4444" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">AMD</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Compute alignment</text>
  </g>

  <g transform="translate(960, 200)">
    <circle r="6" fill="#06B6D4" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">MEMORY</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Vault persistence</text>
  </g>

  <g transform="translate(1090, 200)">
    <circle r="6" fill="#F97316" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">KAVACHA</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Inline governance</text>
  </g>

  <g transform="translate(1220, 200)">
    <circle r="6" fill="#A78BFA" stroke="#0F172A" stroke-width="3"/>
    <text x="-20" y="45" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">LEARNING</text>
    <text x="-20" y="60" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">Continuous evolution</text>
  </g>

  <!-- Connectors between milestones -->
  <g stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4">
    <line x1="56" y1="200" x2="174" y2="200"/>
    <line x1="186" y1="200" x2="304" y2="200"/>
    <line x1="316" y1="200" x2="434" y2="200"/>
    <line x1="446" y1="200" x2="564" y2="200"/>
    <line x1="576" y1="200" x2="694" y2="200"/>
    <line x1="706" y1="200" x2="824" y2="200"/>
    <line x1="836" y1="200" x2="954" y2="200"/>
    <line x1="966" y1="200" x2="1084" y2="200"/>
    <line x1="1096" y1="200" x2="1214" y2="200"/>
  </g>

  <!-- Phase labels above -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="65" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" font-weight="700" fill="#FBBF24">DISCOVERY</text>
    <text x="65" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Observation →</text>
    <text x="65" y="58" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Intent → Mission</text>
  </g>

  <g transform="translate(230, 80)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="80" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" font-weight="700" fill="#60A5FA">CORE BUILD</text>
    <text x="80" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Planning → Panani X</text>
    <text x="80" y="58" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Routing → AMD</text>
  </g>

  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="80" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" font-weight="700" fill="#4ADE80">INTELLIGENCE</text>
    <text x="80" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Memory → Kavacha</text>
    <text x="80" y="58" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Learning Loop</text>
  </g>

  <g transform="translate(710, 80)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="50" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" font-weight="700" fill="#F87171">EVOLUTION</text>
    <text x="50" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Continuous</text>
    <text x="50" y="58" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Improvement</text>
  </g>

  <!-- Status indicators -->
  <g transform="translate(50, 280)">
    <text x="0" y="0" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#E2E8F0" font-weight="600">STATUS:</text>
    <g transform="translate(70, -15)">
      <circle cx="0" cy="0" r="8" fill="#22C55E"/>
      <text x="18" y="5" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#E2E8F0">CENSA DAG Generation</text>
    </g>
    <g transform="translate(70, 20)">
      <circle cx="0" cy="0" r="8" fill="#22C55E"/>
      <text x="18" y="5" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#E2E8F0">Panani X VM Runtime</text>
    </g>
    <g transform="translate(70, 55)">
      <circle cx="0" cy="0" r="8" fill="#22C55E"/>
      <text x="18" y="5" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#E2E8F0">Kavacha Policy Engine</text>
    </g>
    <g transform="translate(70, 90)">
      <circle cx="0" cy="0" r="8" fill="#22C55E"/>
      <text x="18" y="5" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#E2E8F0">Memory Vault (pgvector/Qdrant)</text>
    </g>
    <g transform="translate(70, 125)">
      <circle cx="0" cy="0" r="8" fill="#F59E0B"/>
      <text x="18" y="5" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#E2E8F0">AMD MI300X Routing ( Prepared )</text>
    </g>
    <g transform="translate(70, 160)">
      <circle cx="0" cy="0" r="8" fill="#F59E0B"/>
      <text x="18" y="5" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#E2E8F0">Fireworks Failover ( Live )</text>
    </g>
  </g>
</svg>