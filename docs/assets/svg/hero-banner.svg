<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" width="1400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1320;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#blueGrad)" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1400" height="400" fill="url(#bgGrad)"/>
  <rect width="1400" height="400" fill="url(#grid)"/>
  <ellipse cx="200" cy="200" rx="300" ry="180" fill="url(#glowGold)" filter="url(#glow)"/>
  <ellipse cx="1200" cy="200" rx="300" ry="180" fill="url(#glowBlue)" filter="url(#glow)"/>

  <text x="700" y="140" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="42" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    RE-EVOLVE ON HGI
  </text>
  <text x="700" y="185" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="400" fill="#94A3B8" letter-spacing="3">
    Human-Governed Intelligence
  </text>

  <g transform="translate(700, 220)">
    <rect x="-300" y="-10" width="600" height="60" rx="30" fill="#0F172A" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
    <text x="0" y="30" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="500" fill="url(#goldGrad)">Intelligence Orchestration Layer</text>
  </g>

  <g transform="translate(700, 310)">
    <text x="-180" y="0" text-anchor="end" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#64748B">CENSA</text>
    <rect x="-160" y="-18" width="80" height="36" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <line x1="-80" y1="0" x1="80" y2="0" stroke="url(#blueGrad)" stroke-width="2" stroke-dasharray="8,4"/>
    <rect x="80" y="-18" width="80" height="36" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="0" text-anchor="start" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#64748B">Panani X</text>
    <line x1="160" y1="0" x2="240" y2="0" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8,4"/>
    <rect x="240" y="-18" width="100" height="36" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="340" y="0" text-anchor="start" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#64748B">Memory</text>
    <line x1="340" y1="0" x2="380" y2="0" stroke="url(#blueGrad)" stroke-width="2" stroke-dasharray="8,4"/>
    <rect x="380" y="-18" width="100" height="36" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="1" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="480" y="0" text-anchor="start" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#64748B">Kavacha</text>
    <line x1="480" y1="0" x2="520" y2="0" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8,4"/>
    <rect x="520" y="-18" width="90" height="36" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="610" y="0" text-anchor="start" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#64748B">Router</text>
  </g>

  <g transform="translate(350, 130)">
    <text x="0" y="-10" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#475569" letter-spacing="1">AMD INSTINCT MI300X</text>
    <text x="0" y="10" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#475569" letter-spacing="1">ROCM 7.2 · vLLM</text>
  </g>
  <g transform="translate(1050, 130)">
    <text x="0" y="-10" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#475569" letter-spacing="1" text-anchor="end">FIREWORKS AI</text>
    <text x="0" y="10" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#475569" letter-spacing="1" text-anchor="end">OPENAI-COMPATIBLE</text>
  </g>

  <text x="700" y="380" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#334155" font-weight="500">
    AMD Developer Hackathon Act II  •  Spec-Driven  •  Production-Deployed  •  Open Source
  </text>
</svg>