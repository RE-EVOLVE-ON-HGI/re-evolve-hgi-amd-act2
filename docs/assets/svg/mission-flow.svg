<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    MISSION FLOW — INTENT TO EXECUTION
  </text>

  <!-- Goal Ingress -->
  <g transform="translate(600, 90)">
    <circle cx="0" cy="0" r="50" fill="#1E293B" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#60A5FA" font-weight="600">1</text>
  </g>
  <g transform="translate(600, 160)">
    <rect x="-180" y="-30" width="360" height="60" rx="10" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#E2E8F0" font-weight="600">GOAL INGRESS</text>
    <text x="0" y="15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">"Deploy production inference cluster"</text>
  </g>

  <line x1="600" y1="200" x2="600" y2="240" stroke="url(#blueGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Intent Expansion -->
  <g transform="translate(600, 270)">
    <circle cx="0" cy="0" r="50" fill="#1E293B" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#FBBF24" font-weight="600">2</text>
  </g>
  <g transform="translate(600, 340)">
    <rect x="-200" y="-30" width="400" height="60" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#E2E8F0" font-weight="600">INTENT EXPANSION</text>
    <text x="0" y="15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">CENSA parses → Structured Intent → Task DAG</text>
  </g>

  <line x1="600" y1="380" x2="600" y2="420" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DAG Visualization -->
  <g transform="translate(600, 450)">
    <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#FBBF24" font-weight="600">TASK DAG GENERATED</text>
    <g transform="translate(-250, 10)">
      <rect x="0" y="0" width="110" height="45" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
      <text x="55" y="28" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#60A5FA" font-weight="600">Provision</text>
    </g>
    <g transform="translate(-100, 10)">
      <rect x="0" y="0" width="90" height="45" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
      <text x="45" y="28" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#60A5FA" font-weight="600">Configure</text>
    </g>
    <g transform="translate(30, 10)">
      <rect x="0" y="0" width="90" height="45" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
      <text x="45" y="28" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#60A5FA" font-weight="600">Validate</text>
    </g>
    <g transform="translate(150, 10)">
      <rect x="0" y="0" width="110" height="45" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
      <text x="55" y="28" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#60A5FA" font-weight="600">Monitor</text>
    </g>

    <!-- DAG edges -->
    <line x1="55" y1="55" x2="65" y2="90" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="135" y1="55" x2="75" y2="90" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="75" y1="55" x2="75" y2="90" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="205" y1="55" x2="115" y2="90" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Dependency labels -->
    <text x="-280" y="85" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">depends_on: []</text>
    <text x="-130" y="85" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">depends_on: [Provision]</text>
    <text x="0" y="85" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">depends_on: [Configure]</text>
    <text x="140" y="85" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">depends_on: [Validate]</text>
  </g>

  <line x1="600" y1="550" x2="600" y2="590" stroke="url(#purpleGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent Matching -->
  <g transform="translate(600, 620)">
    <circle cx="0" cy="0" r="50" fill="#1E293B" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#A78BFA" font-weight="600">3</text>
  </g>
  <g transform="translate(600, 690)">
    <rect x="-200" y="-30" width="400" height="60" rx="10" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#E2E8F0" font-weight="600">AGENT MATCHING</text>
    <text x="0" y="15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">Registry Query: infra_provision, k8s_config, health_check → Agents Assigned</text>
  </g>

  <line x1="600" y1="730" x2="600" y2="770" stroke="url(#orangeGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Governed Execution Loop -->
  <g transform="translate(600, 800)">
    <circle cx="0" cy="0" r="50" fill="#1E293B" stroke="url(#orangeGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#FB923C" font-weight="600">4</text>
  </g>
  <g transform="translate(600, 870)">
    <rect x="-220" y="-25" width="440" height="50" rx="10" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="8" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#E2E8F0" font-weight="600">GOVERNED EXECUTION LOOP (per DAG node)</text>
  </g>

  <!-- Lower detail boxes -->
  <g transform="translate(150, 550)">
    <rect x="0" y="0" width="220" height="130" rx="10" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="5" y="5" width="4" height="120" rx="2" fill="url(#redGrad)"/>
    <text x="110" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#F87171" font-weight="600">KAVACHA CHECK</text>
    <text x="110" y="50" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Policy Scan</text>
    <text x="110" y="68" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Block/Allow</text>
    <text x="110" y="86" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Audit Log</text>
    <text x="110" y="110" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">→ YES/NO</text>
  </g>

  <g transform="translate(400, 550)">
    <rect x="0" y="0" width="220" height="130" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="5" y="5" width="4" height="120" rx="2" fill="url(#goldGrad)"/>
    <text x="110" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FBBF24" font-weight="600">PANANI X EXECUTE</text>
    <text x="110" y="50" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">VM Sandbox</text>
    <text x="110" y="68" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Timeout Guard</text>
    <text x="110" y="86" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Result Stream</text>
    <text x="110" y="110" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">→ Output</text>
  </g>

  <g transform="translate(650, 550)">
    <rect x="0" y="0" width="220" height="130" rx="10" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="5" y="5" width="4" height="120" rx="2" fill="url(#greenGrad)"/>
    <text x="110" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#4ADE80" font-weight="600">MEMORY PERSIST</text>
    <text x="110" y="50" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Episodic (pgvector)</text>
    <text x="110" y="68" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Semantic (Qdrant)</text>
    <text x="110" y="86" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">Context Inject</text>
    <text x="110" y="110" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">→ Stored</text>
  </g>

  <g transform="translate(900, 550)">
    <rect x="0" y="0" width="220" height="130" rx="10" fill="url(#glassGrad)" stroke="url(#cyanGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="5" y="5" width="4" height="120" rx="2" fill="url(#cyanGrad)"/>
    <text x="110" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#22D3EE" font-weight="600">INFERENCE ROUTE</text>
    <text x="110" y="50" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">ModelService</text>
    <text x="110" y="68" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">LiteLLM Gateway</text>
    <text x="110" y="86" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#64748B">AMD / Fireworks</text>
    <text x="110" y="110" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#475569">→ Response</text>
  </g>

  <!-- Loop back arrow -->
  <path d="M 1120,615 Q 1150,500 1150,200 Q 600,200 600,240" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="1100" y="350" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#FBBF24" font-weight="600">NEXT NODE</text>
  <text x="1100" y="365" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#FBBF24" font-weight="600">OR COMPLETE</text>
</svg>