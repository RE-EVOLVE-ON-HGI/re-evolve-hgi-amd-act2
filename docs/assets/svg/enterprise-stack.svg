<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    ENTERPRISE STACK — REGULATED DEPLOYMENT ARCHITECTURE
  </text>
  <text x="600" y="65" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#94A3B8">
    FedRAMP / HIPAA / SOC2 / GDPR • Air-Gapped Option • Multi-Region HA • Zero-Trust Network
  </text>

  <!-- Top: Compliance Badges -->
  <g transform="translate(600, 110)">
    <text x="0" y="0" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FBBF24" font-weight="600">COMPLIANCE CERTIFICATIONS & CONTROLS</text>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="9" transform="translate(-500, 20)">
      <!-- FedRAMP -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
        <text x="80" y="20" text-anchor="middle" fill="#60A5FA" font-weight="700" font-size="10">FedRAMP High</text>
        <text x="80" y="38" text-anchor="middle" fill="#94A3B8" font-size="7">NIST 800-53 Rev 5</text>
        <text x="80" y="52" text-anchor="middle" fill="#94A3B8" font-size="7">325 Controls (Baseline)</text>
        <text x="80" y="66" text-anchor="middle" fill="#4ADE80" font-size="7">✓ ATO Target: Q2 2026</text>
      </g>

      <!-- HIPAA -->
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="2" filter="url(#glow)"/>
        <text x="80" y="20" text-anchor="middle" fill="#4ADE80" font-weight="700" font-size="10">HIPAA / HITECH</text>
        <text x="80" y="38" text-anchor="middle" fill="#94A3B8" font-size="7">BAA Required & Signed</text>
        <text x="80" y="52" text-anchor="middle" fill="#94A3B8" font-size="7">PHI Encryption (AES-256)</text>
        <text x="80" y="66" text-anchor="middle" fill="#4ADE80" font-size="7">✓ Audit Ready</text>
      </g>

      <!-- SOC 2 -->
      <g transform="translate(360, 0)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#glow)"/>
        <text x="80" y="20" text-anchor="middle" fill="#A78BFA" font-weight="700" font-size="10">SOC 2 Type II</text>
        <text x="80" y="38" text-anchor="middle" fill="#94A3B8" font-size="7">Security + Availability</text>
        <text x="80" y="52" text-anchor="middle" fill="#94A3B8" font-size="7">Confidentiality (TSC)</text>
        <text x="80" y="66" text-anchor="middle" fill="#A78BFA" font-size="7">✓ Annual Audit</text>
      </g>

      <!-- GDPR -->
      <g transform="translate(540, 0)">
        <rect x="0" y="0" width="160" height="80" rx="8" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="2" filter="url(#glow)"/>
        <text x="80" y="20" text-anchor="middle" fill="#FB923C" font-weight="700" font-size="10">GDPR / CCPA</text>
        <text x="80" y="38" text-anchor="middle" fill="#94A3B8" font-size="7">DPA + SCCs in Place</text>
        <text x="80" y="52" text-anchor="middle" fill="#94A3B8" font-size="7">Right to Erasure API</text>
        <text x="80" y="66" text-anchor="middle" fill="#FB923C" font-size="7">✓ DPO Designated</text>
      </g>
    </g>
  </g>

  <!-- Middle: Architecture Layers -->
  <g transform="translate(600, 230)">
    <!-- Layer 1: Network Perimeter -->
    <g transform="translate(-550, 0)">
      <rect x="-280" y="-25" width="560" height="200" rx="12" fill="url(#glassGrad)" stroke="#334155" stroke-width="1.5"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B" font-weight="600">LAYER 1: NETWORK PERIMETER & IDENTITY</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">ZERO-TRUST NETWORK:</text>
        <text x="20" y="20" fill="#4ADE80">✓ No implicit trust (BeyondCorp model)</text>
        <text x="20" y="36" fill="#4ADE80">✓ mTLS everywhere (SPIFFE/SPIRE)</text>
        <text x="20" y="52" fill="#4ADE80">✓ Private Link / VPC Endpoints only</text>
        <text x="20" y="68" fill="#4ADE80">✓ Egress controlled (allow-list only)</text>

        <text x="0" y="95" fill="#FBBF24" font-weight="600">IDENTITY & ACCESS:</text>
        <text x="20" y="115" fill="#60A5FA">✓ OIDC + SAML (Entra ID, Okta, Ping)</text>
        <text x="20" y="131" fill="#60A5FA">✓ RBAC + ABAC (Cedar/OPA policies)</text>
        <text x="20" y="147" fill="#60A5FA">✓ Just-in-Time access (Teleport)</text>
        <text x="20" y="163" fill="#60A5FA">✓ Service accounts = Workload Identity</text>
      </g>
    </g>

    <!-- Layer 2: Data Plane -->
    <g transform="translate(-550, 195)">
      <rect x="-280" y="-25" width="560" height="200" rx="12" fill="url(#glassGrad)" stroke="#334155" stroke-width="1.5"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B" font-weight="600">LAYER 2: DATA PLANE & ENCRYPTION</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">ENCRYPTION:</text>
        <text x="20" y="20" fill="#4ADE80">✓ TLS 1.3 (all ingress/egress)</text>
        <text x="20" y="36" fill="#4ADE80">✓ AES-256-GCM (data at rest)</text>
        <text x="20" y="52" fill="#4ADE80">✓ Envelope encryption (KMS + DEK)</text>
        <text x="20" y="68" fill="#4ADE80">✓ Customer-managed keys (BYOK)</text>

        <text x="0" y="95" fill="#FBBF24" font-weight="600">DATA STORES:</text>
        <text x="20" y="115" fill="#60A5FA">✓ PostgreSQL (Cloud SQL, HA, encrypted)</text>
        <text x="20" y="131" fill="#60A5FA">✓ Redis (Cluster, TLS, AUTH)</text>
        <text x="20" y="147" fill="#60A5FA">✓ Qdrant (Vector, encrypted volumes)</text>
        <text x="20" y="163" fill="#60A5FA">✓ Object Storage (S3, SSE-KMS, versioned)</text>
      </g>
    </g>

    <!-- Layer 3: Application -->
    <g transform="translate(-550, 390)">
      <rect x="-280" y="-25" width="560" height="200" rx="12" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FBBF24" font-weight="600">LAYER 3: APPLICATION PLATFORM (HGI CORE)</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">ORCHESTRATION:</text>
        <text x="20" y="20" fill="#4ADE80">✓ CENSA: Intent → DAG → Agent matching</text>
        <text x="20" y="36" fill="#4ADE80">✓ Deterministic execution (DAG)</text>
        <text x="20" y="52" fill="#4ADE80">✓ Human-in-the-loop gates (Kavacha)</text>

        <text x="0" y="85" fill="#FBBF24" font-weight="600">RUNTIME:</text>
        <text x="20" y="105" fill="#60A5FA">✓ Panani X: VM isolates (no FS, no net)</text>
        <text x="20" y="121" fill="#60A5FA">✓ WASM runtime (wasmtime) — future</text>
        <text x="20" y="137" fill="#60A5FA">✓ Resource quotas (CPU, mem, time)</text>

        <text x="0" y="165" fill="#FBBF24" font-weight="600">GOVERNANCE:</text>
        <text x="20" y="185" fill="#A78BFA">✓ Kavacha: OPA/Rego policy engine</text>
        <text x="20" y="201" fill="#A78BFA">✓ Input/output scanning (PII, secrets)</text>
        <text x="20" y="217" fill="#A78BFA">✓ Immutable audit ledger (append-only)</text>
      </g>
    </g>

    <!-- Layer 4: AI Inference -->
    <g transform="translate(20, 0)">
      <rect x="-280" y="-25" width="560" height=420 rx="12" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#F87171" font-weight="600">LAYER 4: AI INFERENCE — AMD AI FABRIC</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">AMD INSTINCT MI300X CLUSTER:</text>
        <text x="20" y="20" fill="#4ADE80">✓ 8x MI300X per node (1.5TB HBM3)</text>
        <text x="20" y="36" fill="#4ADE80">✓ ROCm 7.2 + vLLM 0.5+</text>
        <text x="20" y="52" fill="#4ADE80">✓ Tensor Parallel (TP=8) + Pipeline</text>
        <text x="20" y="68" fill="#4ADE80">✓ FlashAttention-2, PagedAttention</text>
        <text x="20" y="84" fill="#4ADE80">✓ FP8 / BF16 quantization</text>

        <text x="0" y="115" fill="#FBBF24" font-weight="600">MODELS DEPLOYED (ON-PREM):</text>
        <text x="20" y="135" fill="#E2E8F0">• Llama-3.1-405B (TP=8, 2 nodes)</text>
        <text x="20" y="151" fill="#E2E8F0">• Llama-3.1-70B (TP=4, 4 replicas)</text>
        <text x="20" y="167" fill="#E2E8F0">• CodeLlama-34B (TP=2, 8 replicas)</text>
        <text x="20" y="183" fill="#E2E8F0">• Mixtral-8x22B (TP=8, 2 replicas)</text>
        <text x="20" y="199" fill="#E2E8F0">• BGE-M3 / E5 embeddings (CPU)</text>

        <text x="0" y="230" fill="#FBBF24" font-weight="600">GATEWAY & ROUTING:</text>
        <text x="20" y="250" fill="#60A5FA">✓ LiteLLM Gateway (load balance, fallback)</text>
        <text x="20" y="266" fill="#60A5FA">✓ Semantic Router (intent → model)</text>
        <text x="20" y="282" fill="#60A5FA">✓ Priority: AMD → Fireworks → OpenRouter</text>
        <text x="20" y="298" fill="#60A5FA">✓ Budget guards per mission/org</text>
        <text x="20" y="314" fill="#60A5FA">✓ Request/Response logging (Kavacha)</text>

        <text x="0" y="345" fill="#FBBF24" font-weight="600">AIR-GAP OPTION:</text>
        <text x="20" y="365" fill="#EF4444">✓ No external egress (fully isolated)</text>
        <text x="20" y="381" fill="#EF4444">✓ Model weights stored in Vault</text>
        <text x="20" y="397" fill="#EF4444">✓ Offline license validation</text>
      </g>
    </g>

    <!-- Layer 5: Observability -->
    <g transform="translate(20, 420)">
      <rect x="-280" y="-25" width="560" height="180" rx="12" fill="url(#glassGrad)" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#22D3EE" font-weight="600">LAYER 5: OBSERVABILITY & AUDIT</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">METRICS: Prometheus (HA) → Grafana + Mimir</text>
        <text x="20" y="20" fill="#E2E8F0">• RED: Rate, Errors, Duration (per service)</text>
        <text x="20" y="36" fill="#E2E8F0">• USE: Utilization, Saturation, Errors (infra)</text>
        <text x="20" y="52" fill="#E2E8F0">• Business: Mission success, cost, latency, quality</text>

        <text x="0" y="75" fill="#FBBF24" font-weight="600">LOGS: Loki (cluster) → Grafana + S3 Archive</text>
        <text x="20" y="95" fill="#E2E8F0">• Structured JSON (Pino), Correlation IDs</text>
        <text x="20" y="111" fill="#E2E8F0">• Retention: 30d hot / 7y cold (S3 Glacier)</text>
        <text x="20" y="127" fill="#E2E8F0">• PII auto-redaction (Kavacha pipeline)</text>

        <text x="0" y="150" fill="#FBBF24" font-weight="600">TRACES: Tempo → Grafana (W3C TraceContext)</text>
        <text x="20" y="170" fill="#E2E8F0">• End-to-end: Ingress → CENSA → Agent → Model → Memory</text>
        <text x="20" y="186" fill="#E2E8F0">• Sampling: 100% errors, 10% success (adaptive)</text>
      </g>
    </g>

    <!-- Layer 6: Disaster Recovery -->
    <g transform="translate(-550, 590)">
      <rect x="-280" y="-25" width="560" height="180" rx="12" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="1.5"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FB923C" font-weight="600">LAYER 6: DISASTER RECOVERY & CONTINUITY</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">RPO / RTO TARGETS:</text>
        <text x="20" y="20" fill="#4ADE80">✓ RPO: 5 min (PostgreSQL PITR, WAL streaming)</text>
        <text x="20" y="36" fill="#4ADE80">✓ RTO: 15 min (Automated failover, health checks)</text>
        <text x="20" y="52" fill="#4ADE80">✓ Multi-AZ: us-east-1, us-west-2, eu-west-1</text>

        <text x="0" y="80" fill="#FBBF24" font-weight="600">BACKUP STRATEGY:</text>
        <text x="20" y="100" fill="#E2E8F0">• Daily snapshots (encrypted, cross-region)</text>
        <text x="20" y="116" fill="#E2E8F0">• Weekly DR drills (automated, validated)</text>
        <text x="20" y="132" fill="#E2E8F0">• Chaos engineering (Litmus, monthly)</text>
        <text x="20" y="148" fill="#E2E8F0">• Runbooks: GitOps (ArgoCD), executable</text>
      </g>
    </g>

    <!-- Layer 7: Supply Chain -->
    <g transform="translate(20, 590)">
      <rect x="-280" y="-25" width="560" height="180" rx="12" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="1.5"/>
      <text x="0" y="-10" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#A78BFA" font-weight="600">LAYER 7: SUPPLY CHAIN SECURITY (SLSA L3)</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-260, 10)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">BUILD INTEGRITY:</text>
        <text x="20" y="20" fill="#4ADE80">✓ SLSA Level 3 (BuildKit, hermetic builds)</text>
        <text x="20" y="36" fill="#4ADE80">✓ Provenance: SLSA attestation (Cosign)</text>
        <text x="20" y="52" fill="#4ADE80">✓ SBOM: SPDX (Syft) + VEX (CSAF)</text>
        <text x="20" y="68" fill="#4ADE80">✓ Sigstore: Keyless signing (Fulcio + Rekor)</text>

        <text x="0" y="95" fill="#FBBF24" font-weight="600">DEPENDENCY MANAGEMENT:</text>
        <text x="20" y="115" fill="#E2E8F0">• Dependabot + Renovate (auto-PR, auto-merge)</text>
        <text x="20" y="131" fill="#E2E8F0">• OSV Scanner (vulns), License check (FOSSA)</text>
        <text x="20" y="147" fill="#E2E8F0">• Private registry (GHCR) + Proxy (npm, PyPI)</text>
        <text x="20" y="163" fill="#E2E8F0">• Pin digests (not tags) in Dockerfiles</text>
      </g>
    </g>
  </g>

  <!-- Key Files Footer -->
  <g transform="translate(600, 780)">
    <text x="0" y="0" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">
      <tspan fill="#FBBF24">infra/terraform/</tspan>  ·  <tspan fill="#FBBF24">infra/helm/</tspan>  ·  <tspan fill="#FBBF24">.github/workflows/security.yml</tspan>  ·  <tspan fill="#FBBF24">policies/kavacha/</tspan>  ·  <tspan fill="#FBBF24">docs/compliance/</tspan>  ·  <tspan fill="#FBBF24">apps/backend/src/middleware/auth.ts</tspan>
    </text>
  </g>
</svg>