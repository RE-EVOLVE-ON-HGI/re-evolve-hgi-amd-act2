<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    SYSTEM ARCHITECTURE — 7-LAYER STACK
  </text>

  <!-- Layer 1: Ingress -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="1000" height="85" rx="10" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="61" rx="2" fill="url(#blueGrad)"/>
    <text x="32" y="32" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#E2E8F0">LAYER 1: INGRESS</text>
    <text x="32" y="52" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">REST · GraphQL · TypeScript SDK · CLI • Auth | Rate Limit | Goal Submission</text>
    <text x="32" y="70" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">ingress.handler.ts · auth.middleware.ts · rate.limiter.ts · goal.validator.ts</text>
  </g>

  <!-- Layer 2: CENSA -->
  <g transform="translate(100, 185)">
    <rect x="0" y="0" width="1000" height="95" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="71" rx="2" fill="url(#goldGrad)"/>
    <text x="32" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#FBBF24">LAYER 2: CENSA — COGNITIVE ORCHESTRATOR</text>
    <text x="32" y="55" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">Goal → Intent → Task DAG → Agent Matching • Dependency Resolution • Confidence Scoring</text>
    <text x="32" y="72" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">intent.service.ts · orchestrator.service.ts · dag.generator.ts · confidence.scorer.ts</text>
  </g>

  <!-- Layer 3: Agent Registry -->
  <g transform="translate(100, 300)">
    <rect x="0" y="0" width="1000" height="85" rx="10" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="61" rx="2" fill="url(#purpleGrad)"/>
    <text x="32" y="32" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#A78BFA">LAYER 3: AGENT REGISTRY & SWARMS</text>
    <text x="32" y="52" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">Capability-to-Agent Mapping · Dynamic Specialist Loading · Engineering | Media | Research Swarms</text>
    <text x="32" y="70" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">registry.service.ts · swarm.loader.ts · skill.spector.ts · skill.file.schema.json</text>
  </g>

  <!-- Layer 4: Panani X -->
  <g transform="translate(100, 405)">
    <rect x="0" y="0" width="1000" height="85" rx="10" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="61" rx="2" fill="url(#orangeGrad)"/>
    <text x="32" y="32" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#FB923C">LAYER 4: PANANI X — SANDBOXED RUNTIME</text>
    <text x="32" y="52" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">Node.js vm Isolates • No FS Access • Enforced Timeouts • Resource Metering • Output Streaming</text>
    <text x="32" y="70" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">panani-runtime.service.ts · vm.isolate.ts · timeout.guard.ts · resource.meter.ts</text>
  </g>

  <!-- Layer 5: Kavacha -->
  <g transform="translate(100, 510)">
    <rect x="0" y="0" width="1000" height="85" rx="10" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="61" rx="2" fill="url(#redGrad)"/>
    <text x="32" y="32" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#F87171">LAYER 5: KAVACHA — ZERO-TRUST GOVERNANCE</text>
    <text x="32" y="52" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">Policy Interceptor • Input/Output Scanning • Immutable Audit Ledger • Threat Blocking</text>
    <text x="32" y="70" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">policy.service.ts · audit.service.ts · opa.rego · compliance.reporter.ts</text>
  </g>

  <!-- Layer 6: Memory Vault -->
  <g transform="translate(100, 615)">
    <rect x="0" y="0" width="1000" height="85" rx="10" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="61" rx="2" fill="url(#greenGrad)"/>
    <text x="32" y="32" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#4ADE80">LAYER 6: MEMORY VAULT — PERSISTENT STATE</text>
    <text x="32" y="52" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#64748B">PostgreSQL + pgvector (Episodic) · Qdrant (Semantic) · Vector Retrieval · Context Injection</text>
    <text x="32" y="70" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#475569">qdrant.service.ts · embeddings.service.ts · episodic.ledger.ts · summarizer.agent.ts</text>
  </g>

  <!-- Layer 7: AMD AI Fabric -->
  <g transform="translate(100, 720)">
    <rect x="0" y="0" width="1000" height="65" rx="10" fill="url(#glassGrad)" stroke="url(#cyanGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="4" height="41" rx="2" fill="url(#cyanGrad)"/>
    <text x="32" y="30" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700" fill="#22D3EE">LAYER 7: AMD AI FABRIC — COMPUTE SUBSTRATE</text>
    <text x="32" y="48" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">AMD Instinct MI300X · ROCm 7.2 · vLLM · LiteLLM Gateway • Provider-Agnostic Inference</text>
  </g>

  <!-- Data flow arrows -->
  <g transform="translate(1120, 122)">
    <line x1="0" y1="0" x2="0" y2="620" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  </g>
  <text x="1140" y="140" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#334155" text-anchor="middle" transform="rotate(-90, 1140, 140)">DATA FLOW →</text>

  <!-- Layer labels on right -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="10" font-weight="600" text-anchor="start">
    <text x="1130" y="130" fill="#60A5FA">L1</text>
    <text x="1130" y="220" fill="#FBBF24">L2</text>
    <text x="1130" y="330" fill="#A78BFA">L3</text>
    <text x="1130" y="435" fill="#FB923C">L4</text>
    <text x="1130" y="540" fill="#F87171">L5</text>
    <text x="1130" y="645" fill="#4ADE80">L6</text>
    <text x="1130" y="750" fill="#22D3EE">L7</text>
  </g>
</svg>