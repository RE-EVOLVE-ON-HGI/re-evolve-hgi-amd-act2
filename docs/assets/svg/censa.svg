<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    CENSA — COGNITIVE ORCHESTRATOR (DETAIL)
  </text>
  <text x="600" y="65" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#94A3B8">
    Internal Pipeline: Goal Validation → Intent Inference → DAG Construction → Agent Assignment → Confidence Calibration
  </text>

  <!-- Center: Core Pipeline Flow -->
  <g transform="translate(600, 380)">
    <!-- Pipeline stages horizontally -->
    <g transform="translate(-450, -80)">
      <ellipse cx="0" cy="0" rx="110" ry="55" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-18" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#60A5FA" font-weight="600">1. GOAL VALIDATION</text>
      <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#E2E8F0">goal.validator.ts</text>
      <text x="0" y="7" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Schema Check • AuthZ</text>
      <text x="0" y="19" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Rate Limit • Quota</text>
      <text x="0" y="31" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="7" fill="#22C55E">✓ ValidatedGoal</text>
    </g>

    <line x1="-340" y1="0" x2="-230" y2="0" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(-100, -80)">
      <ellipse cx="0" cy="0" rx="110" ry="55" fill="url(#glassGrad)" stroke="url(#cyanGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-18" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#22D3EE" font-weight="600">2. INTENT INFERENCE</text>
      <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#E2E8F0">intent.service.ts</text>
      <text x="0" y="7" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Embedding → Classify</text>
      <text x="0" y="19" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Confidence ≥ 0.80</text>
      <text x="0" y="31" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="7" fill="#22C55E">✓ Intent<CodeTask|Research|Analysis|Creative></text>
    </g>

    <line x1="10" y1="0" x2="120" y2="0" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(250, -80)">
      <ellipse cx="0" cy="0" rx="110" ry="55" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-18" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#FBBF24" font-weight="600">3. DAG CONSTRUCTION</text>
      <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#E2E8F0">dag.generator.ts</text>
      <text x="0" y="7" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Topological Sort</text>
      <text x="0" y="19" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Cycle Detection</text>
      <text x="0" y="31" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="7" fill="#22C55E">✓ TaskDAG[nodes, edges]</text>
    </g>

    <line x1="360" y1="0" x2="470" y2="0" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(600, -80)">
      <ellipse cx="0" cy="0" rx="110" ry="55" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-18" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#A78BFA" font-weight="600">4. AGENT ASSIGNMENT</text>
      <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#E2E8F0">registry.service.ts</text>
      <text x="0" y="7" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Capability Match</text>
      <text x="0" y="19" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Load Balancing</text>
      <text x="0" y="31" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="7" fill="#22C55E">✓ Task→Agent Map</text>
    </g>

    <line x1="710" y1="0" x2="820" y2="0" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(950, -80)">
      <ellipse cx="0" cy="0" rx="110" ry="55" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-18" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#4ADE80" font-weight="600">5. CONFIDENCE CALIB.</text>
      <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#E2E8F0">confidence.scorer.ts</text>
      <text x="0" y="7" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Thompson Sampling</text>
      <text x="0" y="19" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Bayesian Update</text>
      <text x="0" y="31" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="7" fill="#22C55E">✓ ExecutionPlan</text>
    </g>
  </g>

  <!-- Orchestrator Core (below pipeline) -->
  <g transform="translate(600, 540)">
    <rect x="-400" y="-40" width="800" height="180" rx="12" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="-15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#FBBF24" font-weight="700">ORCHESTRATOR.CORE — orchestrator.service.ts</text>

    <!-- Four quadrants -->
    <g transform="translate(-350, 20)">
      <text x="0" y="0" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#60A5FA" font-weight="600">MISSION QUEUE</text>
      <text x="0" y="18" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">BullMQ + Redis</text>
      <text x="0" y="33" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Priority Queues</text>
      <text x="0" y="48" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Retry: 3x exp backoff</text>
      <text x="0" y="63" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Dead Letter Queue</text>
    </g>

    <g transform="translate(-50, 20)">
      <text x="0" y="0" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#A78BFA" font-weight="600">STATE MACHINE</text>
      <text x="0" y="18" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">XState v5</text>
      <text x="0" y="33" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">PENDING → PLANNING</text>
      <text x="0" y="48" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">EXECUTING → COMPLETE</text>
      <text x="0" y="63" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#EF4444">FAILED → RETRY</text>
    </g>

    <g transform="translate(250, 20)">
      <text x="0" y="0" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#FB923C" font-weight="600">EVENT BUS</text>
      <text x="0" y="18" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">EventEmitter2</text>
      <text x="0" y="33" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">task.created</text>
      <text x="0" y="48" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">task.completed</text>
      <text x="0" y="63" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">mission.failed</text>
    </g>

    <g transform="translate(450, 20)">
      <text x="0" y="0" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#4ADE80" font-weight="600">MEMORY BARRIER</text>
      <text x="0" y="18" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">Context Injection</text>
      <text x="0" y="33" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Episodic Recall</text>
      <text x="0" y="48" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Semantic Search</text>
      <text x="0" y="63" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Vault TTL: 30d</text>
    </g>
  </g>

  <!-- Side: Intent Types -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="130" height="320" rx="10" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="65" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#60A5FA" font-weight="600">INTENT TYPES</text>
    <g transform="translate(65, 45)" font-family="JetBrains Mono, Menlo, monospace" font-size="8" text-anchor="middle">
      <text y="0" fill="#E2E8F0">CODE_GENERATION</text>
      <text y="20" fill="#64748B">→ CodeAgent</text>
      <text y="45" fill="#E2E8F0">RESEARCH</text>
      <text y="65" fill="#64748B">→ ResearchAgent</text>
      <text y="90" fill="#E2E8F0">ANALYSIS</text>
      <text y="110" fill="#64748B">→ AnalystAgent</text>
      <text y="135" fill="#E2E8F0">CREATIVE</text>
      <text y="155" fill="#64748B">→ WriterAgent</text>
      <text y="180" fill="#E2E8F0">DEBUG</text>
      <text y="200" fill="#64748B">→ DebugAgent</text>
      <text y="225" fill="#E2E8F0">REVIEW</text>
      <text y="245" fill="#64748B">→ ReviewAgent</text>
      <text y="270" fill="#E2E8F0">DEPLOY</text>
      <text y="290" fill="#64748B">→ DeployAgent</text>
    </g>
  </g>

  <!-- Side: DAG Properties -->
  <g transform="translate(1020, 200)">
    <rect x="0" y="0" width="130" height="320" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="65" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#FBBF24" font-weight="600">DAG PROPERTIES</text>
    <g transform="translate(65, 45)" font-family="JetBrains Mono, Menlo, monospace" font-size="8" text-anchor="middle">
      <text y="0" fill="#E2E8F0">Max Depth: 8</text>
      <text y="20" fill="#64748B">Max Width: 16</text>
      <text y="45" fill="#E2E8F0">Cycle Check: ✓</text>
      <text y="65" fill="#64748B">Topo Sort: Kahn's</text>
      <text y="90" fill="#E2E8F0">Parallel Groups</text>
      <text y="110" fill="#64748B">Auto-detected</text>
      <text y="135" fill="#E2E8F0">Fan-out Limit: 8</text>
      <text y="160" fill="#E2E8F0">Crit Path Calc</text>
      <text y="180" fill="#64748B">Dijkstra</text>
      <text y="205" fill="#E2E8F0">Timeout/Task</text>
      <text y="225" fill="#64748B">300s default</text>
      <text y="250" fill="#E2E8F0">Retry Policy</text>
      <text y="270" fill="#64748B">3x exponential</text>
      <text y="295" fill="#E2E8F0">Rollback</text>
      <text y="315" fill="#64748B">Compensating</text>
    </g>
  </g>

  <!-- Bottom: Key Files -->
  <g transform="translate(600, 750)">
    <text x="0" y="0" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">
      <tspan fill="#FBBF24">intent.service.ts</tspan>  ·  <tspan fill="#FBBF24">orchestrator.service.ts</tspan>  ·  <tspan fill="#FBBF24">dag.generator.ts</tspan>  ·  <tspan fill="#FBBF24">confidence.scorer.ts</tspan>  ·  <tspan fill="#FBBF24">registry.service.ts</tspan>  ·  <tspan fill="#FBBF24">mission.execute.ts</tspan>
    </text>
  </g>
</svg>