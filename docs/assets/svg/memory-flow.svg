<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    MEMORY VAULT — EPISODIC + SEMANTIC FLOW
  </text>
  <text x="600" y="65" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#94A3B8">
    PostgreSQL + pgvector (Episodic) · Qdrant (Semantic) · Vector Retrieval · Context Injection
  </text>

  <!-- Center: Dual-Store Architecture -->
  <g transform="translate(600, 380)">
    <!-- Episodic Store (Left) -->
    <g transform="translate(-300, 0)">
      <rect x="-180" y="-150" width="360" height="300" rx="12" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-130" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#60A5FA" font-weight="600">EPISODIC STORE</text>
      <text x="0" y="-110" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">PostgreSQL + pgvector</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-160, -80)">
        <text x="0" y="0" fill="#E2E8F0" font-weight="600">TABLE: episodic_memories</text>
        <text x="0" y="20" fill="#64748B">id UUID PK</text>
        <text x="0" y="36" fill="#64748B">mission_id UUID</text>
        <text x="0" y="52" fill="#64748B">task_id UUID</text>
        <text x="0" y="68" fill="#64748B">embedding vector(1536)</text>
        <text x="0" y="84" fill="#64748B">payload JSONB</text>
        <text x="0" y="100" fill="#64748B">intent_type VARCHAR</text>
        <text x="0" y="116" fill="#64748B">outcome VARCHAR</text>
        <text x="0" y="132" fill="#64748B">metrics JSONB</text>
        <text x="0" y="148" fill="#64748B">created_at TIMESTAMPTZ</text>
        <text x="0" y="164" fill="#64748B">expires_at TIMESTAMPTZ</text>

        <text x="0" y="190" fill="#E2E8F0" font-weight="600">INDEXES:</text>
        <text x="0" y="210" fill="#64748B">• HNSW on embedding (ivfflat)</text>
        <text x="0" y="226" fill="#64748B">• B-tree on mission_id</text>
        <text x="0" y="242" fill="#64748B">• BRIN on created_at</text>
        <text x="0" y="258" fill="#64748B">• GIN on payload JSONB</text>

        <text x="0" y="280" fill="#22C55E" font-weight="600">TTL: 30 days (auto-cleanup)</text>
      </g>
    </g>

    <!-- Bidirectional arrows -->
    <g transform="translate(0, -50)">
      <line x1="-80" y1="0" x2="80" y2="0" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="0" y="-15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#FBBF24">DUAL-WRITE</text>
      <line x1="80" y1="20" x2="-80" y2="20" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)" opacity="0.5"/>
      <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">SYNC</text>
    </g>

    <!-- Semantic Store (Right) -->
    <g transform="translate(300, 0)">
      <rect x="-180" y="-150" width="360" height="300" rx="12" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="-130" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#A78BFA" font-weight="600">SEMANTIC STORE</text>
      <text x="0" y="-110" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">Qdrant Vector DB</text>

      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-160, -80)">
        <text x="0" y="0" fill="#E2E8F0" font-weight="600">COLLECTION: agent_knowledge</text>
        <text x="0" y="20" fill="#64748B">Vector size: 1536</text>
        <text x="0" y="36" fill="#64748B">Distance: Cosine</text>
        <text x="0" y="52" fill="#64748B">HNSW: M=16, ef=128</text>
        <text x="0" y="68" fill="#64748B">Shards: 4 (auto-scale)</text>

        <text x="0" y="90" fill="#E2E8F0" font-weight="600">PAYLOAD FIELDS:</text>
        <text x="0" y="110" fill="#64748B">capability: VARCHAR</text>
        <text x="0" y="126" fill="#64748B">source: "agent" | "doc" | "user"</text>
        <text x="0" y="142" fill="#64748B">confidence: FLOAT</text>
        <text x="0" y="158" fill="#64748B">tags: STRING[]</text>
        <text x="0" y="174" fill="#64748B">metadata: JSON</text>

        <text x="0" y="196" fill="#E2E8F0" font-weight="600">FILTERS:</text>
        <text x="0" y="216" fill="#64748B">capability == "code_generation"</text>
        <text x="0" y="232" fill="#64748B">confidence >= 0.8</text>
        <text x="0" y="248" fill="#64748B">tags IN ["production","v2"]</text>

        <text x="0" y="270" fill="#22C55E" font-weight="600">Tenant isolation via payload filter</text>
      </g>
    </g>
  </g>

  <!-- Top: Write Path -->
  <g transform="translate(600, 110)">
    <rect x="-500" y="0" width="1000" height="60" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#FBBF24" font-weight="600">WRITE PATH: episodic.store()  +  semantic.upsert()</text>
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-480, 18)">
      <text x="0" y="0" fill="#E2E8F0">Panani X Result → Embedding (text-embedding-3-large) → Dual Write</text>
      <text x="0" y="18" fill="#64748B">Episodic: full context + metrics (pgvector HNSW)</text>
      <text x="0" y="36" fill="#64748B">Semantic: agent knowledge extraction (Qdrant HNSW)</text>
    </g>
  </g>

  <!-- Bottom Left: Read Path - Context Injection -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="350" height="220" rx="10" fill="url(#glassGrad)" stroke="url(#cyanGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="175" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#22D3EE" font-weight="600">READ PATH: CONTEXT INJECTION</text>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(15, 45)">
      <text x="0" y="0" fill="#E2E8F0" font-weight="600">1. BEFORE AGENT EXECUTION</text>
      <text x="0" y="20" fill="#64748B">injectContext(missionId, taskId)</text>

      <text x="0" y="45" fill="#E2E8F0" font-weight="600">2. EPISODIC RECALL (3 results)</text>
      <text x="20" y="65" fill="#64748B">SELECT * FROM episodic_memories</text>
      <text x="20" y="83" fill="#64748B">WHERE mission_id = $1</text>
      <text x="20" y="101" fill="#64748B">ORDER BY embedding <-> $2</text>
      <text x="20" y="119" fill="#64748B">LIMIT 3</text>

      <text x="0" y="143" fill="#E2E8F0" font-weight="600">3. SEMANTIC SEARCH (3 results)</text>
      <text x="20" y="163" fill="#64748B">qdrant.search({</text>
      <text x="40" y="181" fill="#64748B">vector: queryEmbedding,</text>
      <text x="40" y="199" fill="#64748B">filter: { capability: task.cap },</text>
      <text x="40" y="217" fill="#64748B">limit: 3, score_threshold: 0.75</text>
      <text x="20" y="235" fill="#64748B">})</text>
    </g>
  </g>

  <g transform="translate(425, 350)">
    <rect x="0" y="0" width="350" height="220" rx="10" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="175" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#4ADE80" font-weight="600">MERGE & HYDRATE</text>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(15, 45)">
      <text x="0" y="0" fill="#E2E8F0" font-weight="600">4. MERGE RESULTS</text>
      <text x="20" y="20" fill="#64748B">episodic: recent task executions</text>
      <text x="20" y="38" fill="#64748B">semantic: domain knowledge</text>
      <text x="20" y="56" fill="#64748B">dedupe by content hash</text>
      <text x="20" y="74" fill="#64748B">rank by recency + relevance</text>

      <text x="0" y="100" fill="#E2E8F0" font-weight="600">5. CONTEXT HYDRATION</text>
      <text x="20" y="120" fill="#64748B">task.payload.context = {</text>
      <text x="40" y="138" fill="#60A5FA">episodic: [...],</text>
      <text x="40" y="156" fill="#A78BFA">semantic: [...],</text>
      <text x="40" y="174" fill="#FBBF24">confidenceBoost: 0.15</text>
      <text x="20" y="192" fill="#64748B">}</text>

      <text x="0" y="216" fill="#22C55E" font-weight="600" font-size="9">→ Agent sees relevant history + knowledge</text>
    </g>
  </g>

  <g transform="translate(800, 350)">
    <rect x="0" y="0" width="350" height="220" rx="10" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="175" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FB923C" font-weight="600">SUMMARIZATION & RETENTION</text>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(15, 45)">
      <text x="0" y="0" fill="#E2E8F0" font-weight="600">AUTO-SUMMARIZE (daily cron)</text>
      <text x="20" y="20" fill="#64748B">• Group by mission_id</text>
      <text x="20" y="38" fill="#64748B">• LLM: summarize(task outputs)</text>
      <text x="20" y="56" fill="#64748B">• Store as compressed episode</text>
      <text x="20" y="74" fill="#64748B">• Original → cold storage</text>

      <text x="0" y="100" fill="#E2E8F0" font-weight="600">RETENTION POLICY</text>
      <text x="20" y="120" fill="#64748B">• Hot (pgvector): 30 days</text>
      <text x="20" y="138" fill="#64748B">• Warm (S3/Parquet): 1 year</text>
      <text x="20" y="156" fill="#64748B">• Cold (Glacier): 7 years</text>
      <text x="20" y="174" fill="#64748B">• GDPR: delete on request</text>

      <text x="0" y="200" fill="#FBBF24" font-weight="600">METRICS</text>
      <text x="20" y="220" fill="#64748B">Episodic: 45M vectors indexed</text>
      <text x="20" y="238" fill="#64748B">Semantic: 12M vectors indexed</text>
      <text x="20" y="256" fill="#64748B">P99 Recall: < 50ms</text>
      <text x="20" y="274" fill="#64748B">Context hit rate: 78%</text>
    </g>
  </g>

  <!-- Bottom: Embeddings Service -->
  <g transform="translate(600, 590)">
    <rect x="-500" y="0" width="1000" height="100" rx="10" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#60A5FA" font-weight="600">EMBEDDINGS SERVICE — embeddings.service.ts</text>
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-480, 40)">
      <text x="0" y="0" fill="#E2E8F0">Model: text-embedding-3-large (1536 dims)  •  Batch: 100  •  Cache: Redis (TTL 24h)</text>
      <text x="0" y="20" fill="#E2E8F0">P95 Latency: 45ms  •  Cost: $0.0001/1K tokens  •  Fallback: local all-MiniLM-L6-v2</text>
      <text x="0" y="40" fill="#64748B">functions: embed(text) → vector[]  |  embedBatch(texts[]) → vector[][]  |  similarity(v1, v2) → float</text>
    </g>
  </g>

  <!-- Key Files -->
  <g transform="translate(600, 775)">
    <text x="0" y="0" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">
      <tspan fill="#FBBF24">qdrant.service.ts</tspan>  ·  <tspan fill="#FBBF24">embeddings.service.ts</tspan>  ·  <tspan fill="#FBBF24">episodic.ledger.ts</tspan>  ·  <tspan fill="#FBBF24">summarizer.agent.ts</tspan>  ·  <tspan fill="#FBBF24">context.injector.ts</tspan>  ·  <tspan fill="#FBBF24">retention.cron.ts</tspan>
    </text>
  </g>
</svg>