<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    SYSTEM FLOW — END-TO-END MISSION EXECUTION
  </text>
  <text x="600" y="65" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#94A3B8">
    Submit → Plan → Match → Govern → Execute → Inference → Persist → Loop
  </text>

  <!-- Top: Request Ingress -->
  <g transform="translate(600, 110)">
    <ellipse cx="0" cy="0" rx="200" ry="40" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#60A5FA" font-weight="600">1. INGRESS — REST / GraphQL / CLI</text>
    <text x="0" y="12" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">POST /api/v1/missions { goal, constraints, intent_overrides? }</text>
    <text x="0" y="26" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Auth: JWT (RS256)  •  Rate Limit: 100 req/min  •  Validation: Zod Schema</text>
  </g>

  <line x1="600" y1="150" x2="600" y2="190" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: CENSA Planning -->
  <g transform="translate(600, 220)">
    <rect x="-250" y="0" width="500" height="70" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#FBBF24" font-weight="600">2. CENSA — PLAN: Goal → Intent → Task DAG</text>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">intent.service.ts → dag.generator.ts → confidence.scorer.ts</text>
    <text x="0" y="55" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">DAG: tasks[], edges[], parallel_groups[], critical_path[]</text>
  </g>

  <line x1="600" y1="290" x2="600" y2="330" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Agent Matching -->
  <g transform="translate(600, 360)">
    <rect x="-250" y="0" width="500" height="70" rx="10" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#A78BFA" font-weight="600">3. REGISTRY — MATCH: Task → Agent Assignment</text>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">registry.service.ts → swarm.loader.ts → skill.spector.ts</text>
    <text x="0" y="55" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Capability Jaccard  •  Load Balancing  •  Confidence Thompson Sampling</text>
  </g>

  <line x1="600" y1="430" x2="600" y2="470" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Kavacha Governance -->
  <g transform="translate(600, 500)">
    <rect x="-250" y="0" width="500" height="70" rx="10" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#F87171" font-weight="600">4. KAVACHA — GOVERN: Policy Intercept (Pre-Execution)</text>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">policy.service.ts → opa.rego → audit.service.ts</text>
    <text x="0" y="55" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Input Scan → OPA Decision (ALLOW/DENY/REDACT) → Immutable Audit Log</text>
  </g>

  <line x1="600" y1="570" x2="600" y2="610" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 5: Panani X Execution -->
  <g transform="translate(600, 640)">
    <rect x="-250" y="0" width="500" height="70" rx="10" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#FB923C" font-weight="600">5. PANANI X — EXECUTE: Sandboxed Task Runtime</text>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">panani-runtime.service.ts → vm.isolate.ts → timeout.guard.ts</text>
    <text x="0" y="55" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">VM Isolate  •  Resource Metering  •  Output Streaming  •  Timeout Guard</text>
  </g>

  <line x1="600" y1="710" x2="600" y2="750" stroke="url(#goldGrad)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 6: Inference & Persist -->
  <g transform="translate(600, 780)">
    <rect x="-250" y="0" width="500" height="70" rx="10" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#4ADE80" font-weight="600">6. INFERENCE + PERSIST: Provider Router + Memory Vault</text>
    <text x="0" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">litellm.gateway.ts (AMD MI300X → Fireworks → OpenRouter) + qdrant.service.ts</text>
    <text x="0" y="55" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Episodic (pgvector) + Semantic (Qdrant)  •  Context Injection for Next Task</text>
  </g>

  <!-- Side: Loop Arrow -->
  <g transform="translate(1150, 400)">
    <path d="M 0 0 Q 100 0 100 200 Q 100 400 0 400" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
    <text x="50" y="200" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#FBBF24" font-weight="600">LOOP</text>
    <text x="50" y="220" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Next Task</text>
    <text x="50" y="235" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">or Complete</text>
  </g>

  <!-- Left Panel: Key Metrics per Stage -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="150" height="550" rx="10" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="75" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#FBBF24" font-weight="600">STAGE METRICS</text>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="7" transform="translate(10, 40)">
      <g transform="translate(0, 0)">
        <text x="0" y="0" fill="#60A5FA" font-weight="600">INGRESS</text>
        <text x="0" y="15" fill="#64748B">P99: 12ms</text>
        <text x="0" y="30" fill="#64748B">Throughput: 5K/s</text>
      </g>
      <g transform="translate(0, 60)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">PLAN</text>
        <text x="0" y="15" fill="#64748B">P99: 180ms</text>
        <text x="0" y="30" fill="#64748B">DAG depth ≤ 8</text>
      </g>
      <g transform="translate(0, 120)">
        <text x="0" y="0" fill="#A78BFA" font-weight="600">MATCH</text>
        <text x="0" y="15" fill="#64748B">P99: 45ms</text>
        <text x="0" y="30" fill="#64748B">Confidence > 0.85</text>
      </g>
      <g transform="translate(0, 180)">
        <text x="0" y="0" fill="#F87171" font-weight="600">GOVERN</text>
        <text x="0" y="15" fill="#64748B">P99: 8ms</text>
        <text x="0" y="30" fill="#64748B">False +: 0.02%</text>
      </g>
      <g transform="translate(0, 240)">
        <text x="0" y="0" fill="#FB923C" font-weight="600">EXECUTE</text>
        <text x="0" y="15" fill="#64748B">P99: 2.3s</text>
        <text x="0" y="30" fill="#64748B">Timeout: 300s</text>
      </g>
      <g transform="translate(0, 300)">
        <text x="0" y="0" fill="#4ADE80" font-weight="600">INFER</text>
        <text x="0" y="15" fill="#64748B">P99: 850ms</text>
        <text x="0" y="30" fill="#64748B">Failover < 500ms</text>
      </g>
      <g transform="translate(0, 360)">
        <text x="0" y="0" fill="#4ADE80" font-weight="600">PERSIST</text>
        <text x="0" y="15" fill="#64748B">P99: 25ms</text>
        <text x="0" y="30" fill="#64748B">Dual-write sync</text>
      </g>
      <g transform="translate(0, 420)">
        <text x="0" y="0" fill="#FBBF24" font-weight="600">TOTAL</text>
        <text x="0" y="15" fill="#FBBF24">P99: ~3.5s</text>
        <text x="0" y="30" fill="#64748B">(parallel tasks)</text>
      </g>
    </g>
  </g>

  <!-- Right Panel: Error Handling -->
  <g transform="translate(1000, 150)">
    <rect x="0" y="0" width="150" height="550" rx="10" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="75" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#F87171" font-weight="600">ERROR HANDLING</text>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="7" transform="translate(10, 40)">
      <g transform="translate(0, 0)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">PLAN FAIL</text>
        <text x="0" y="15" fill="#64748B">→ Clarify Goal</text>
        <text x="0" y="30" fill="#64748B">→ User Prompt</text>
      </g>
      <g transform="translate(0, 60)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">MATCH FAIL</text>
        <text x="0" y="15" fill="#64748B">→ General Agent</text>
        <text x="0" y="30" fill="#64748B">→ Lower Conf.</text>
      </g>
      <g transform="translate(0, 120)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">GOVERN DENY</text>
        <text x="0" y="15" fill="#64748B">→ Quarantine</text>
        <text x="0" y="30" fill="#64748B">→ Human Review</text>
      </g>
      <g transform="translate(0, 180)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">EXEC TIMEOUT</text>
        <text x="0" y="15" fill="#64748B">→ Partial Output</text>
        <text x="0" y="30" fill="#64748B">→ Retry (3x)</text>
      </g>
      <g transform="translate(0, 240)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">INFER FAIL</text>
        <text x="0" y="15" fill="#64748B">→ Failover</text>
        <text x="0" y="30" fill="#64748B">→ Next Provider</text>
      </g>
      <g transform="translate(0, 300)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">PERSIST FAIL</text>
        <text x="0" y="15" fill="#64748B">→ Write-ahead</text>
        <text x="0" y="30" fill="#64748B">→ Retry Queue</text>
      </g>
      <g transform="translate(0, 360)">
        <text x="0" y="0" fill="#EF4444" font-weight="600">MISSION FAIL</text>
        <text x="0" y="15" fill="#64748B">→ Compensation</text>
        <text x="0" y="30" fill="#64748B">→ Rollback + DLQ</text>
      </g>
    </g>
  </g>

  <!-- Bottom: Key Files -->
  <g transform="translate(600, 950)">
    <text x="0" y="0" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">
      <tspan fill="#FBBF24">mission.execute.ts</tspan>  ·  <tspan fill="#FBBF24">orchestrator.service.ts</tspan>  ·  <tspan fill="#FBBF24">intent.service.ts</tspan>  ·  <tspan fill="#FBBF24">dag.generator.ts</tspan>  ·  <tspan fill="#FBBF24">registry.service.ts</tspan>  ·  <tspan fill="#FBBF24">policy.service.ts</tspan>  ·  <tspan fill="#FBBF24">panani-runtime.service.ts</tspan>  ·  <tspan fill="#FBBF24">litellm.gateway.ts</tspan>  ·  <tspan fill="#FBBF24">qdrant.service.ts</tspan>
    </text>
  </g>
</svg>