<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    REPO UNIVERSE — MONOREPO ARCHITECTURE
  </text>
  <text x="600" y="65" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#94A3B8">
    Turborepo Monorepo · TypeScript · Shared Contracts · Independent Deployments
  </text>

  <!-- Root -->
  <g transform="translate(600, 110)">
    <ellipse cx="0" cy="0" rx="180" ry="35" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#FBBF24" font-weight="700">re-evolve-hgi (ROOT)</text>
    <text x="0" y="22" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="8" fill="#64748B">Turborepo + pnpm Workspace + TypeScript Project References</text>
  </g>

  <!-- Apps Layer -->
  <g transform="translate(600, 200)">
    <!-- Backend -->
    <g transform="translate(-350, 0)">
      <rect x="-150" y="0" width="300" height="200" rx="12" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#60A5FA" font-weight="600">apps/backend</text>
      <text x="0" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">Fastify + TypeScript + Prisma</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-130, 65)">
        <text x="0" y="0" fill="#64748B">src/</text>
        <text x="20" y="18" fill="#E2E8F0">ingress/       → REST, GraphQL, Auth</text>
        <text x="20" y="34" fill="#E2E8F0">censa/         → Orchestrator, Intent, DAG</text>
        <text x="20" y="50" fill="#E2E8F0">registry/      → Agent Registry, Swarms</text>
        <text x="20" y="66" fill="#E2E8F0">panani/        → Sandboxed Runtime</text>
        <text x="20" y="82" fill="#E2E8F0">kavacha/       → Governance, OPA, Audit</text>
        <text x="20" y="98" fill="#E2E8F0">memory/        → Vault, Embeddings, Qdrant</text>
        <text x="20" y="114" fill="#E2E8F0">models/        → LiteLLM Gateway, Routing</text>
        <text x="20" y="130" fill="#E2E8F0">shared/        → Types, Config, Utils</text>
        <text x="0" y="150" fill="#64748B">prisma/schema.prisma</text>
        <text x="0" y="166" fill="#64748B">Dockerfile + railway.toml</text>
        <text x="0" y="182" fill="#22C55E" font-size="7">Deploy: Railway (Container)</text>
      </g>
    </g>

    <!-- Frontend -->
    <g transform="translate(50, 0)">
      <rect x="-150" y="0" width="300" height="200" rx="12" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#A78BFA" font-weight="600">apps/frontend</text>
      <text x="0" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">Next.js 15 + React 19 + Tailwind</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-130, 65)">
        <text x="0" y="0" fill="#64748B">src/</text>
        <text x="20" y="18" fill="#E2E8F0">app/           → App Router (RSC)</text>
        <text x="20" y="34" fill="#E2E8F0">components/    → UI + Domain Components</text>
        <text x="20" y="50" fill="#E2E8F0">hooks/         → SWR, Mission Hooks</text>
        <text x="20" y="66" fill="#E2E8F0">lib/           → API Client, Auth</text>
        <text x="20" y="82" fill="#E2E8F0">stores/        → Zustand State</text>
        <text x="0" y="105" fill="#64748B">public/</text>
        <text x="0" y="121" fill="#64748B">next.config.ts</text>
        <text x="0" y="137" fill="#64748B">Dockerfile + vercel.json</text>
        <text x="0" y="153" fill="#22C55E" font-size="7">Deploy: Vercel (Edge)</text>
      </g>
    </g>

    <!-- CLI -->
    <g transform="translate(450, 0)">
      <rect x="-150" y="0" width="300" height="200" rx="12" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="2" filter="url(#glow)"/>
      <text x="0" y="25" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#FB923C" font-weight="600">apps/cli</text>
      <text x="0" y="45" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#E2E8F0">Node.js + Commander + Ink</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-130, 65)">
        <text x="0" y="0" fill="#64748B">src/</text>
        <text x="20" y="18" fill="#E2E8F0">commands/      → mission, agent, config</text>
        <text x="20" y="34" fill="#E2E8F0">panani/        → Local Sandbox Runner</text>
        <text x="20" y="50" fill="#E2E8F0">auth/          → Device Flow, Tokens</text>
        <text x="20" y="66" fill="#E2E8F0">output/        → Rich Terminal UI</text>
        <text x="0" y="88" fill="#64748B">bin/hgi (entry)</text>
        <text x="0" y="104" fill="#64748B">package.json (ESM)</text>
        <text x="0" y="120" fill="#22C55E" font-size="7">Install: npm i -g @hgi/cli</text>
      </g>
    </g>
  </g>

  <!-- Packages Layer -->
  <g transform="translate(600, 430)">
    <text x="0" y="-15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#FBBF24" font-weight="600">SHARED PACKAGES (packages/*)</text>

    <g transform="translate(-350, 10)">
      <rect x="-120" y="0" width="240" height="140" rx="8" fill="#1E293B" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#22D3EE" font-weight="600">@hgi/contracts</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-100, 35)">
        <text x="0" y="0" fill="#E2E8F0">Zod Schemas → TS Types</text>
        <text x="0" y="18" fill="#E2E8F0">Mission, Task, Agent</text>
        <text x="0" y="36" fill="#E2E8F0">Intent, DAG, Result</text>
        <text x="0" y="54" fill="#E2E8F0">Policy, Audit Event</text>
        <text x="0" y="72" fill="#E2E8F0">Memory, Embedding</text>
        <text x="0" y="90" fill="#64748B">Single source of truth</text>
        <text x="0" y="108" fill="#64748B">Validates: API, CLI, SDK</text>
      </g>
    </g>

    <g transform="translate(-50, 10)">
      <rect x="-120" y="0" width="240" height="140" rx="8" fill="#1E293B" stroke="url(#greenGrad)" stroke-width="1.5"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#4ADE80" font-weight="600">@hgi/sdk</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-100, 35)">
        <text x="0" y="0" fill="#E2E8F0">TypeScript Client</text>
        <text x="0" y="18" fill="#E2E8F0">mission.create()</text>
        <text x="0" y="36" fill="#E2E8F0">mission.stream()</text>
        <text x="0" y="54" fill="#E2E8F0">agent.invoke()</text>
        <text x="0" y="72" fill="#E2E8F0">memory.search()</text>
        <text x="0" y="90" fill="#E2E8F0">Auth: Bearer + Refresh</text>
        <text x="0" y="108" fill="#64748B">React Query / SWR hooks</text>
      </g>
    </g>

    <g transform="translate(250, 10)">
      <rect x="-120" y="0" width="240" height="140" rx="8" fill="#1E293B" stroke="url(#redGrad)" stroke-width="1.5"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#F87171" font-weight="600">@hgi/panani</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-100, 35)">
        <text x="0" y="0" fill="#E2E8F0">Core Runtime (Isomorphic)</text>
        <text x="0" y="18" fill="#E2E8F0">vm.isolate.ts</text>
        <text x="0" y="36" fill="#E2E8F0">timeout.guard.ts</text>
        <text x="0" y="54" fill="#E2E8F0">resource.meter.ts</text>
        <text x="0" y="72" fill="#E2E8F0">sandbox.globals.ts</text>
        <text x="0" y="90" fill="#E2E8F0">Used by: CLI + Backend</text>
        <text x="0" y="108" fill="#64748B">Zero deps, < 50KB</text>
      </g>
    </g>

    <g transform="translate(450, 10)">
      <rect x="-120" y="0" width="240" height="140" rx="8" fill="#1E293B" stroke="url(#purpleGrad)" stroke-width="1.5"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#A78BFA" font-weight="600">@hgi/agents</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="8" transform="translate(-100, 35)">
        <text x="0" y="0" fill="#E2E8F0">Agent Base Classes</text>
        <text x="0" y="18" fill="#E2E8F0">CodeAgent</text>
        <text x="0" y="36" fill="#E2E8F0">ResearchAgent</text>
        <text x="0" y="54" fill="#E2E8F0">WriterAgent</text>
        <text x="0" y="72" fill="#E2E8F0">DebugAgent</text>
        <text x="0" y="90" fill="#64748B">Skill Spector Tests</text>
        <text x="0" y="108" fill="#64748B">Auto-register on import</text>
      </g>
    </g>
  </g>

  <!-- Config & Tooling -->
  <g transform="translate(600, 600)">
    <text x="0" y="-15" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#FBBF24" font-weight="600">CONFIG & TOOLING</text>

    <g transform="translate(-350, 10)">
      <rect x="-120" y="0" width="240" height="160" rx="8" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#60A5FA" font-weight="600">TURBOREPO PIPELINE</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="7" transform="translate(-110, 35)">
        <text x="0" y="0" fill="#E2E8F0">turbo.json</text>
        <text x="0" y="16" fill="#64748B">build: dependsOn ^build</text>
        <text x="0" y="32" fill="#64748B">test: dependsOn ^build</text>
        <text x="0" y="48" fill="#64748B">lint: no depends</text>
        <text x="0" y="64" fill="#64748B">typecheck: dependsOn ^build</text>
        <text x="0" y="80" fill="#64748B">docker: dependsOn build</text>
        <text x="0" y="96" fill="#64748B">deploy: dependsOn docker</text>
        <text x="0" y="112" fill="#64748B">Remote Cache: Vercel</text>
        <text x="0" y="128" fill="#64748B">Affected: smart rebuilds</text>
      </g>
    </g>

    <g transform="translate(-50, 10)">
      <rect x="-120" y="0" width="240" height="160" rx="8" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#FB923C" font-weight="600">SHARED CONFIG</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="7" transform="translate(-110, 35)">
        <text x="0" y="0" fill="#E2E8F0">eslint.config.js (flat)</text>
        <text x="0" y="16" fill="#E2E8F0">prettier.config.js</text>
        <text x="0" y="32" fill="#E2E8F0">tsconfig.base.json</text>
        <text x="0" y="48" fill="#E2E8F0">jest.config.ts</text>
        <text x="0" y="64" fill="#E2E8F0">vitest.config.ts</text>
        <text x="0" y="80" fill="#E2E8F0">tailwind.config.ts</text>
        <text x="0" y="96" fill="#64748B">Conventional Commits</text>
        <text x="0" y="112" fill="#64748B">Husky + lint-staged</text>
        <text x="0" y="128" fill="#64748B">Changesets (versioning)</text>
      </g>
    </g>

    <g transform="translate(250, 10)">
      <rect x="-120" y="0" width="240" height="160" rx="8" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#F87171" font-weight="600">CI/CD (GitHub Actions)</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="7" transform="translate(-110, 35)">
        <text x="0" y="0" fill="#E2E8F0">.github/workflows/</text>
        <text x="0" y="16" fill="#E2E8F0">ci.yml: lint, typecheck, test</text>
        <text x="0" y="32" fill="#E2E8F0">docker.yml: multi-arch build</text>
        <text x="0" y="48" fill="#E2E8F0">deploy-railway.yml</text>
        <text x="0" y="64" fill="#E2E8F0">deploy-vercel.yml</text>
        <text x="0" y="80" fill="#E2E8F0">release.yml: changesets</text>
        <text x="0" y="96" fill="#64748B">Matrix: Node 20, 22</text>
        <text x="0" y="112" fill="#64748B">Cache: pnpm + Turbo</text>
        <text x="0" y="128" fill="#64748B">Gates: coverage ≥ 80%</text>
      </g>
    </g>

    <g transform="translate(450, 10)">
      <rect x="-120" y="0" width="240" height="160" rx="8" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="20" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#A78BFA" font-weight="600">DOCS & SPECS</text>
      <g font-family="JetBrains Mono, Menlo, monospace" font-size="7" transform="translate(-110, 35)">
        <text x="0" y="0" fill="#E2E8F0">/docs/architecture/*.md</text>
        <text x="0" y="16" fill="#E2E8F0">/docs/assets/svg/*.svg</text>
        <text x="0" y="32" fill="#E2E8F0">/spec/*.md (source of truth)</text>
        <text x="0" y="48" fill="#E2E8F0">SPEC_INDEX.md (traceability)</text>
        <text x="0" y="64" fill="#E2E8F0">TRACEABILITY_MATRIX.md</text>
        <text x="0" y="80" fill="#E2E8F0">ADR/*.md (decisions)</text>
        <text x="0" y="96" fill="#E2E8F0">CHANGELOG.md (auto)</text>
        <text x="0" y="112" fill="#64748B">Diagrams: Mermaid + SVG</text>
        <text x="0" y="128" fill="#64748B">Versioned with code</text>
      </g>
    </g>
  </g>

  <!-- Bottom: Dependency Graph Note -->
  <g transform="translate(600, 790)">
    <text x="0" y="0" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#64748B">
      Dependency Flow: apps/* → packages/* (via pnpm workspace protocol)  •  No circular deps  •  Independent versioning via Changesets
    </text>
  </g>
</svg>