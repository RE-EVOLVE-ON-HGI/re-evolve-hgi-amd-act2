<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080D16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <text x="600" y="40" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="24" font-weight="700" fill="url(#goldGrad)" filter="url(#textGlow)">
    CURRENT ARCHITECTURE — 7-LAYER STACK
  </text>

  <g transform="translate(600, 60)">
    <defs>
      <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.9" />
        <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0.95" />
      </linearGradient>
    </defs>
  </g>

  <!-- Layer 1: Ingress -->
  <g transform="translate(100, 90)">
    <rect x="0" y="0" width="1000" height="95" rx="12" fill="url(#glassGrad)" stroke="url(#blueGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="65" rx="2.5" fill="url(#blueGrad)"/>
    <text x="35" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#E2E8F0">LAYER 1  INGRESS</text>
    <text x="35" y="58" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">REST · GraphQL · TypeScript SDK · CLI • Auth | Rate Limit | Goal Submission</text>
    <g transform="translate(900, 47)">
      <circle r="18" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#3B82F6" font-weight="600">L1</text>
    </g>
  </g>

  <!-- Layer 2: CENSA -->
  <g transform="translate(100, 205)">
    <rect x="0" y="0" width="1000" height="105" rx="12" fill="url(#glassGrad)" stroke="url(#goldGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="75" rx="2.5" fill="url(#goldGrad)"/>
    <text x="35" y="38" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#FBBF24">LAYER 2  CENSA — COGNITIVE ORCHESTRATOR</text>
    <text x="35" y="62" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">Goal → Intent → Task DAG → Agent Matching • Dependency Resolution • Confidence Scoring</text>
    <text x="35" y="86" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569">intent.service.ts · orchestrator.service.ts · dag.generator.ts · confidence.scorer.ts</text>
    <g transform="translate(900, 52)">
      <circle r="18" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FBBF24" font-weight="600">L2</text>
    </g>
  </g>

  <!-- Layer 3: Agent Registry -->
  <g transform="translate(100, 330)">
    <rect x="0" y="0" width="1000" height="95" rx="12" fill="url(#glassGrad)" stroke="url(#purpleGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="65" rx="2.5" fill="url(#purpleGrad)"/>
    <text x="35" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#A78BFA">LAYER 3  AGENT REGISTRY & SWARMS</text>
    <text x="35" y="58" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">Capability-to-Agent Mapping · Dynamic Specialist Loading · Engineering | Media | Research Swarms</text>
    <text x="35" y="82" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569">registry.service.ts · swarm.loader.ts · skill.spector.ts · skill.file.schema.json</text>
    <g transform="translate(900, 47)">
      <circle r="18" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#A78BFA" font-weight="600">L3</text>
    </g>
  </g>

  <!-- Layer 4: Panani X -->
  <g transform="translate(100, 445)">
    <rect x="0" y="0" width="1000" height="95" rx="12" fill="url(#glassGrad)" stroke="url(#orangeGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="65" rx="2.5" fill="url(#orangeGrad)"/>
    <text x="35" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#FB923C">LAYER 4  PANANI X — SANDBOXED RUNTIME</text>
    <text x="35" y="58" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">Node.js vm Isolates • No FS Access • Enforced Timeouts • Resource Metering • Output Streaming</text>
    <text x="35" y="82" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569">panani-runtime.service.ts · vm.isolate.ts · timeout.guard.ts · resource.meter.ts</text>
    <g transform="translate(900, 47)">
      <circle r="18" fill="#1E293B" stroke="#F97316" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#FB923C" font-weight="600">L4</text>
    </g>
  </g>

  <!-- Layer 5: Kavacha -->
  <g transform="translate(100, 560)">
    <rect x="0" y="0" width="1000" height="95" rx="12" fill="url(#glassGrad)" stroke="url(#redGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="65" rx="2.5" fill="url(#redGrad)"/>
    <text x="35" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#F87171">LAYER 5  KAVACHA — ZERO-TRUST GOVERNANCE</text>
    <text x="35" y="58" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">Policy Interceptor • Input/Output Scanning • Immutable Audit Ledger • Threat Blocking</text>
    <text x="35" y="82" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569">policy.service.ts · audit.service.ts · opa.rego · compliance.reporter.ts</text>
    <g transform="translate(900, 47)">
      <circle r="18" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#F87171" font-weight="600">L5</text>
    </g>
  </g>

  <!-- Layer 6: Memory Vault -->
  <g transform="translate(100, 675)">
    <rect x="0" y="0" width="1000" height="95" rx="12" fill="url(#glassGrad)" stroke="url(#greenGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="65" rx="2.5" fill="url(#greenGrad)"/>
    <text x="35" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#4ADE80">LAYER 6  MEMORY VAULT — PERSISTENT STATE</text>
    <text x="35" y="58" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">PostgreSQL + pgvector (Episodic) · Qdrant (Semantic) · Vector Retrieval · Context Injection</text>
    <text x="35" y="82" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569">qdrant.service.ts · embeddings.service.ts · episodic.ledger.ts · summarizer.agent.ts</text>
    <g transform="translate(900, 47)">
      <circle r="18" fill="#1E293B" stroke="#22C55E" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#4ADE80" font-weight="600">L6</text>
    </g>
  </g>

  <!-- Layer 7: AMD AI Fabric -->
  <g transform="translate(100, 790)">
    <rect x="0" y="0" width="1000" height="95" rx="12" fill="url(#glassGrad)" stroke="url(#cyanGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="15" y="15" width="5" height="65" rx="2.5" fill="url(#cyanGrad)"/>
    <text x="35" y="35" font-family="JetBrains Mono, Menlo, monospace" font-size="16" font-weight="700" fill="#22D3EE">LAYER 7  AMD AI FABRIC — COMPUTE SUBSTRATE</text>
    <text x="35" y="58" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748B">AMD Instinct MI300X · ROCm 7.2 · vLLM · LiteLLM Gateway • Provider-Agnostic Inference</text>
    <text x="35" y="82" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569">model.service.ts · litellm.gateway.ts · rocm.config.ts · routing.policy.ts</text>
    <g transform="translate(900, 47)">
      <circle r="18" fill="#1E293B" stroke="#06B6D4" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#22D3EE" font-weight="600">L7</text>
    </g>
  </g>

  <!-- Data flow arrows on right side -->
  <g transform="translate(1120, 137)">
    <line x1="0" y1="0" x2="0" y2="485" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  </g>
  <text x="1140" y="150" font-family="JetBrains Mono, Menlo, monospace" font-size="9" fill="#334155" text-anchor="middle" transform="rotate(-90, 1140, 150)">DATA FLOW</text>

  <!-- Callout: Mission Lifecycle -->
  <g transform="translate(100, 895)">
    <text x="0" y="0" font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#334155" opacity="0.7">
      Mission Lifecycle: Submit → Plan (DAG) → Match → Govern → Execute (Sandbox) → Inference (Route) → Persist → Loop
    </text>
  </g>
</svg>