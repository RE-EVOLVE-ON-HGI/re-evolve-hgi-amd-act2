<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f640"/>
      <stop offset="100%" style="stop-color:#00000000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="700" height="360" fill="url(#bg)" rx="12"/>
  <rect width="700" height="360" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="350" y="36" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="3">AGENT GALAXY</text>
  <text x="350" y="56" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#475569" text-anchor="middle">Specialist Agent Constellation</text>

  <!-- Center hub -->
  <circle cx="350" cy="195" r="40" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="350" cy="195" r="28" fill="#3b82f615"/>
  <text x="350" y="191" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="700">CENSA</text>
  <text x="350" y="204" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#60a5fa" text-anchor="middle">Orchestrator</text>

  <!-- Orbit ring -->
  <circle cx="350" cy="195" r="110" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Agent nodes with connection lines -->
  <!-- CodeSynth -->
  <line x1="350" y1="155" x2="350" y2="78" stroke="#8b5cf650" stroke-width="1"/>
  <circle cx="350" cy="70" r="24" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="350" y="66" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#a78bfa" text-anchor="middle" font-weight="700">Code</text>
  <text x="350" y="78" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#a78bfa" text-anchor="middle">Synth</text>

  <!-- ResearchPilot -->
  <line x1="389" y1="162" x2="446" y2="120" stroke="#06b6d450" stroke-width="1"/>
  <circle cx="460" cy="112" r="24" fill="#0f172a" stroke="#06b6d4" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="460" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#22d3ee" text-anchor="middle" font-weight="700">Research</text>
  <text x="460" y="120" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#22d3ee" text-anchor="middle">Pilot</text>

  <!-- KavachaAudit -->
  <line x1="390" y1="195" x2="456" y2="195" stroke="#ef444450" stroke-width="1"/>
  <circle cx="476" cy="195" r="24" fill="#0f172a" stroke="#ef4444" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="476" y="191" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">Kavacha</text>
  <text x="476" y="203" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#f87171" text-anchor="middle">Audit</text>

  <!-- SupportArchitect -->
  <line x1="378" y1="230" x2="436" y2="272" stroke="#22c55e50" stroke-width="1"/>
  <circle cx="452" cy="282" r="24" fill="#0f172a" stroke="#22c55e" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="452" y="278" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#4ade80" text-anchor="middle" font-weight="700">Support</text>
  <text x="452" y="290" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#4ade80" text-anchor="middle">Architect</text>

  <!-- DataAnalyst -->
  <line x1="323" y1="230" x2="268" y2="270" stroke="#f59e0b50" stroke-width="1"/>
  <circle cx="248" cy="283" r="24" fill="#0f172a" stroke="#f59e0b" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="248" y="279" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#fbbf24" text-anchor="middle" font-weight="700">Data</text>
  <text x="248" y="291" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#fbbf24" text-anchor="middle">Analyst</text>

  <!-- DocWriter -->
  <line x1="312" y1="195" x2="244" y2="195" stroke="#ec489950" stroke-width="1"/>
  <circle cx="224" cy="195" r="24" fill="#0f172a" stroke="#ec4899" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="224" y="191" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#f472b6" text-anchor="middle" font-weight="700">Doc</text>
  <text x="224" y="203" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#f472b6" text-anchor="middle">Writer</text>

  <!-- SecurityScan -->
  <line x1="312" y1="162" x2="255" y2="120" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <circle cx="242" cy="112" r="24" fill="#0f172a" stroke="#f97316" stroke-width="1.2" filter="url(#softglow)"/>
  <text x="242" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#fb923c" text-anchor="middle" font-weight="700">Security</text>
  <text x="242" y="120" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#fb923c" text-anchor="middle">Scan</text>

  <!-- Bottom label -->
  <text x="350" y="348" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#334155" text-anchor="middle">Re-Evolve on HGI · Dynamic Specialist Loading via Agent Registry</text>
</svg>
