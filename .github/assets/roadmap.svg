<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="33%" style="stop-color:#8b5cf6"/>
      <stop offset="66%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="220" fill="url(#bg)" rx="12"/>
  <rect width="900" height="220" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <text x="450" y="28" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="3">ROADMAP · THE JOURNEY AHEAD</text>

  <!-- Track line -->
  <rect x="60" y="110" width="780" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="60" y="110" width="780" height="3" rx="1.5" fill="url(#track)" opacity="0.7"/>

  <!-- 2026 Foundation -->
  <circle cx="130" cy="111" r="22" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="130" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="700">2026</text>
  <text x="130" y="120" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#3b82f6" text-anchor="middle">NOW</text>
  <text x="130" y="150" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Foundation</text>
  <text x="130" y="166" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Core OS · SDK · CLI</text>
  <text x="130" y="178" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Hackathon · Open Source</text>

  <!-- 2027 Expansion -->
  <circle cx="330" cy="111" r="22" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow)"/>
  <text x="330" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="700">2027</text>
  <text x="330" y="120" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#7c3aed" text-anchor="middle">Q1-Q4</text>
  <text x="330" y="80" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Expansion</text>
  <text x="330" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Studio Tools · Marketplace</text>
  <text x="330" y="52" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Multi-provider Routing</text>

  <!-- 2028 Enterprise -->
  <circle cx="570" cy="111" r="22" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)"/>
  <text x="570" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#22d3ee" text-anchor="middle" font-weight="700">2028</text>
  <text x="570" y="120" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#06b6d4" text-anchor="middle">Q1-Q4</text>
  <text x="570" y="150" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Enterprise</text>
  <text x="570" y="166" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Federated Memory</text>
  <text x="570" y="178" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Regulated AI · Analytics</text>

  <!-- 2029+ Global -->
  <circle cx="790" cy="111" r="22" fill="#22c55e15" stroke="#22c55e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="790" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#4ade80" text-anchor="middle" font-weight="700">2029+</text>
  <text x="790" y="120" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#22c55e" text-anchor="middle">∞</text>
  <text x="790" y="80" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Global Ecosystem</text>
  <text x="790" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Cross-cloud Agent Swarms</text>
  <text x="790" y="52" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#64748b" text-anchor="middle">Autonomous Organizations</text>

  <text x="450" y="208" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#1e293b" text-anchor="middle">Re-Evolve on HGI · Long-term Roadmap</text>
</svg>
