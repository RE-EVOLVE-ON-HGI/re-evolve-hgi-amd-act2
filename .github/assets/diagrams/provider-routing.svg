<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <text x="50" y="50" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1">ADAPTIVE PROVIDER ROUTER</text>
  <line x1="50" y1="65" x2="750" y2="65" stroke="#1F1F23" stroke-width="1.5"/>

  <!-- Prompt -->
  <rect x="60" y="140" width="120" height="50" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="120" y="170" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">Query Token</text>

  <path d="M 180,165 L 240,165" stroke="#FFF" stroke-width="1"/>

  <!-- Router Decision Box -->
  <rect x="240" y="115" width="180" height="100" rx="6" fill="#18181B" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="330" y="145" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#FFF" text-anchor="middle">ModelService Router</text>
  <text x="330" y="170" font-family="monospace" font-size="10" fill="#EF4444" text-anchor="middle">Check local MI300X</text>
  <text x="330" y="190" font-family="monospace" font-size="9" fill="#A1A1AA" text-anchor="middle">Fallback timeout: 500ms</text>

  <!-- Branch lines -->
  <path d="M 420,165 L 480,120 M 420,165 L 480,210" stroke="#FFF" stroke-width="1"/>

  <!-- Route A: AMD -->
  <rect x="480" y="95" width="230" height="50" rx="6" fill="#18181B" stroke="#EF4444" stroke-width="1"/>
  <text x="595" y="125" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">Local AMD Instinct Cluster (ROCm)</text>

  <!-- Route B: Fireworks -->
  <rect x="480" y="185" width="230" height="50" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="595" y="215" font-family="monospace" font-size="11" fill="#A1A1AA" text-anchor="middle">Fireworks Standby API Failover</text>
</svg>