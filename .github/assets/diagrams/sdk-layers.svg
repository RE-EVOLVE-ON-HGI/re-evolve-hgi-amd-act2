<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <text x="50" y="50" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1">HGI SDK STACK LAYERS</text>
  <line x1="50" y1="65" x2="750" y2="65" stroke="#1F1F23" stroke-width="1.5"/>

  <!-- SDK Ingress -->
  <rect x="100" y="110" width="160" height="180" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="180" y="140" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FBBF24" text-anchor="middle">Ingress SDK / CLI</text>
  <text x="180" y="175" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">hgi-sdk.ts</text>
  <text x="180" y="200" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">hgi-cli.ts</text>
  <text x="180" y="225" font-family="monospace" font-size="9" fill="#666">REST endpoints</text>

  <path d="M 260,200 L 320,200" stroke="#FFF" stroke-width="1"/>

  <!-- Core Services -->
  <rect x="320" y="110" width="160" height="180" rx="6" fill="#18181B" stroke="#8B5CF6" stroke-width="1"/>
  <text x="400" y="140" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">HGI Core OS</text>
  <text x="400" y="175" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">CENSA Planning</text>
  <text x="400" y="200" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">Kavacha Security</text>
  <text x="400" y="225" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">Memory Vault</text>

  <path d="M 480,200 L 540,200" stroke="#FFF" stroke-width="1"/>

  <!-- Execution Node -->
  <rect x="540" y="110" width="160" height="180" rx="6" fill="#18181B" stroke="#06B6D4" stroke-width="1"/>
  <text x="620" y="140" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Sandbox Node</text>
  <text x="620" y="175" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">Panani X VM</text>
  <text x="620" y="200" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">BullMQ Queues</text>
</svg>