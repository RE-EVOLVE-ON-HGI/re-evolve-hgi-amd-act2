<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <text x="50" y="50" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1">DEPLOYMENT PIPELINE</text>
  <line x1="50" y1="65" x2="750" y2="65" stroke="#1F1F23" stroke-width="1.5"/>

  <!-- Steps -->
  <g transform="translate(80, 130)">
    <rect width="120" height="60" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="60" y="35" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">1. Git push</text>
  </g>

  <path d="M 200,160 L 250,160" stroke="#FFF" stroke-width="1"/>

  <g transform="translate(250, 130)">
    <rect width="120" height="60" rx="6" fill="#18181B" stroke="#F59E0B" stroke-width="1"/>
    <text x="60" y="35" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">2. Next.js build</text>
  </g>

  <path d="M 370,160 L 420,160" stroke="#FFF" stroke-width="1"/>

  <g transform="translate(420, 130)">
    <rect width="120" height="60" rx="6" fill="#18181B" stroke="#06B6D4" stroke-width="1"/>
    <text x="60" y="35" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">3. Static check</text>
  </g>

  <path d="M 540,160 L 590,160" stroke="#FFF" stroke-width="1"/>

  <g transform="translate(590, 130)">
    <rect width="130" height="60" rx="6" fill="#18181B" stroke="#22C55E" stroke-width="1"/>
    <text x="65" y="35" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">4. Vercel deploy</text>
  </g>
</svg>