<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <text x="50" y="50" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1">MEMORY VAULT CONTEXT FLOW</text>
  <line x1="50" y1="65" x2="750" y2="65" stroke="#1F1F23" stroke-width="1.5"/>

  <!-- Input -->
  <rect x="60" y="130" width="140" height="50" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="130" y="160" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">Goal Spec</text>

  <path d="M 200,155 L 250,155" stroke="#FFF" stroke-width="1"/>

  <!-- Retrieval pgvector -->
  <rect x="250" y="110" width="160" height="90" rx="6" fill="#18181B" stroke="#10B981" stroke-width="1"/>
  <text x="330" y="140" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#FFF" text-anchor="middle">pgvector Lookup</text>
  <text x="330" y="165" font-family="monospace" font-size="10" fill="#A1A1AA" text-anchor="middle">Episodic memory</text>

  <path d="M 410,155 L 460,155" stroke="#FFF" stroke-width="1"/>

  <!-- Context builder -->
  <rect x="460" y="130" width="140" height="50" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="530" y="160" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">Build LLM Context</text>

  <path d="M 600,155 L 650,155" stroke="#FFF" stroke-width="1"/>

  <!-- Result -->
  <rect x="650" y="130" width="90" height="50" rx="6" fill="#18181B" stroke="#F59E0B" stroke-width="1"/>
  <text x="695" y="160" font-family="monospace" font-size="11" fill="#FFF" text-anchor="middle">Inference</text>
</svg>