<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <text x="50" y="50" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1">AGENT LIFECYCLE</text>
  <line x1="50" y1="65" x2="750" y2="65" stroke="#1F1F23" stroke-width="1.5"/>

  <!-- Step 1 -->
  <g transform="translate(60, 120)">
    <circle cx="50" cy="50" r="35" fill="#18181B" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="50" y="53" font-family="monospace" font-size="10" fill="#FFF" text-anchor="middle">SPAWN</text>
    <text x="50" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Init VM Sandbox</text>
  </g>

  <path d="M 170,170 L 210,170" stroke="#FFF" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Step 2 -->
  <g transform="translate(230, 120)">
    <circle cx="50" cy="50" r="35" fill="#18181B" stroke="#06B6D4" stroke-width="1.5"/>
    <text x="50" y="53" font-family="monospace" font-size="10" fill="#FFF" text-anchor="middle">REGISTER</text>
    <text x="50" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Map Skills AST</text>
  </g>

  <path d="M 340,170 L 380,170" stroke="#FFF" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Step 3 -->
  <g transform="translate(400, 120)">
    <circle cx="50" cy="50" r="35" fill="#18181B" stroke="#EF4444" stroke-width="1.5"/>
    <text x="50" y="53" font-family="monospace" font-size="10" fill="#FFF" text-anchor="middle">SCAN</text>
    <text x="50" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Kavacha Audit</text>
  </g>

  <path d="M 510,170 L 550,170" stroke="#FFF" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Step 4 -->
  <g transform="translate(570, 120)">
    <circle cx="50" cy="50" r="35" fill="#18181B" stroke="#10B981" stroke-width="1.5"/>
    <text x="50" y="53" font-family="monospace" font-size="10" fill="#FFF" text-anchor="middle">EXECUTE</text>
    <text x="50" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Run on Compute</text>
