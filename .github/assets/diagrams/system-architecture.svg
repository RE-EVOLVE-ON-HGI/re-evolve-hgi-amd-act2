<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <text x="50" y="50" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1">SYSTEM ARCHITECTURE</text>
  <line x1="50" y1="65" x2="750" y2="65" stroke="#1F1F23" stroke-width="1.5"/>

  <!-- Presentation Layer -->
  <g transform="translate(100, 100)">
    <rect width="600" height="50" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="300" y="30" font-family="monospace" font-size="11" fill="#FBBF24" text-anchor="middle" font-weight="700">PRESENTATION LAYER (Next.js 16 • Turbopack • Web Audio)</text>
  </g>

  <!-- Orchestration Layer -->
  <g transform="translate(100, 180)">
    <rect width="600" height="50" rx="6" fill="#18181B" stroke="#8B5CF6" stroke-width="1.5" style="filter: drop-shadow(0 0 8px rgba(139,92,246,0.2));"/>
    <text x="300" y="30" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="700">COGNITIVE ORCHESTRATION LAYER (CENSA • NestJS • BullMQ)</text>
  </g>

  <!-- Execution & Isolation -->
  <g transform="translate(100, 260)">
    <rect width="600" height="50" rx="6" fill="#18181B" stroke="#06B6D4" stroke-width="1.5" style="filter: drop-shadow(0 0 8px rgba(6,182,212,0.2));"/>
    <text x="300" y="30" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="700">SANDBOX EXECUTION RUNTIME (Panani X • Node VM Isolates)</text>
  </g>

  <!-- Infrastructure & Compute -->
  <g transform="translate(100, 340)">
    <rect width="600" height="60" rx="6" fill="#18181B" stroke="#EF4444" stroke-width="1.5" style="filter: drop-shadow(0 0 8px rgba(239,68,68,0.2));"/>
    <text x="300" y="30" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="700">COMPUTE &amp; HARDWARE ROUTER (AMD Instinct MI300X • ROCm 7.2)</text>
    <text x="300" y="48" font-family="monospace" font-size="9" fill="#EF4444" text-anchor="middle">vLLM • Fireworks AI API Standby</text>
  </g>

  <!-- Connecting Arrows -->
  <path d="M 400,150 L 400,180" stroke="#FFF" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 400,230 L 400,260" stroke="#FFF" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 400,310 L 400,340" stroke="#FFF" stroke-width="1" stroke-dasharray="3 3"/>
</svg>