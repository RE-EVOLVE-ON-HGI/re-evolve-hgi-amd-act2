<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <rect x="30" y="30" width="740" height="290" rx="8" fill="#0D0D11" stroke="#1F1F23" stroke-width="1.5"/>
  
  <text x="50" y="60" font-family="monospace" font-size="12" fill="#F59E0B" font-weight="700">SYSTEM PERFORMANCE METRICS</text>
  <line x1="50" y1="75" x2="750" y2="75" stroke="#1F1F23" stroke-width="1"/>
  
  <g transform="translate(50, 100)">
    <rect width="150" height="180" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="75" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-anchor="middle">Inference Latency</text>
    <text x="75" y="90" font-family="monospace" font-size="28" font-weight="700" fill="#FFF" text-anchor="middle">226ms</text>
    <text x="75" y="140" font-family="monospace" font-size="10" fill="#10B981" text-anchor="middle">-48% (cached)</text>
  </g>
  
  <g transform="translate(225, 100)">
    <rect width="150" height="180" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="75" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-anchor="middle">Vector Vault</text>
    <text x="75" y="90" font-family="monospace" font-size="28" font-weight="700" fill="#FFF" text-anchor="middle">78.2%</text>
    <text x="75" y="140" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">Nominal index</text>
  </g>

  <g transform="translate(400, 100)">
    <rect width="150" height="180" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="75" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-anchor="middle">Success Rate</text>
    <text x="75" y="90" font-family="monospace" font-size="28" font-weight="700" fill="#FFF" text-anchor="middle">96.7%</text>
    <text x="75" y="140" font-family="monospace" font-size="10" fill="#10B981" text-anchor="middle">+1.4% change</text>
  </g>

  <g transform="translate(575, 100)">
    <rect width="150" height="180" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="75" y="40" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-anchor="middle">Job Queue Size</text>
    <text x="75" y="90" font-family="monospace" font-size="28" font-weight="700" fill="#FFF" text-anchor="middle">32 items</text>
    <text x="75" y="140" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">0 bottlenecks</text>
  </g>
</svg>