<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <defs>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#core-glow)"/>
  
  <!-- Connection paths -->
  <path d="M 400,200 L 200,100 M 400,200 L 600,100 M 400,200 L 200,300 M 400,200 L 600,300 M 400,200 L 400,60" stroke="#27272A" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- Central core -->
  <circle cx="400" cy="200" r="40" fill="#0D0D11" stroke="#F59E0B" stroke-width="2" style="filter: drop-shadow(0px 0px 20px rgba(245,158,11,0.6));"/>
  <text x="400" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">HGI CORE</text>
  
  <!-- Satellites -->
  <!-- CENSA -->
  <circle cx="200" cy="100" r="28" fill="#18181B" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="200" y="104" font-family="monospace" font-size="10" fill="#E2E8F0" text-anchor="middle">CENSA</text>
  
  <!-- Panani X -->
  <circle cx="600" cy="100" r="28" fill="#18181B" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="600" y="104" font-family="monospace" font-size="10" fill="#E2E8F0" text-anchor="middle">PANANI X</text>
  
  <!-- Vault -->
  <circle cx="200" cy="300" r="28" fill="#18181B" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="304" font-family="monospace" font-size="10" fill="#E2E8F0" text-anchor="middle">VAULT</text>
  
  <!-- Kavacha -->
  <circle cx="600" cy="300" r="28" fill="#18181B" stroke="#EF4444" stroke-width="1.5"/>
  <text x="600" y="304" font-family="monospace" font-size="10" fill="#E2E8F0" text-anchor="middle">KAVACHA</text>
  
  <!-- EIR -->
  <circle cx="400" cy="60" r="28" fill="#18181B" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="400" y="64" font-family="monospace" font-size="10" fill="#E2E8F0" text-anchor="middle">EIR</text>
</svg>