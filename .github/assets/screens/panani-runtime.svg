<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <rect x="30" y="30" width="740" height="290" rx="8" fill="#0D0D11" stroke="#1F1F23" stroke-width="1.5"/>
  
  <text x="50" y="60" font-family="monospace" font-size="12" fill="#06B6D4" font-weight="700">PANANI X SPECIALIST SWARM REGISTRY</text>
  <line x1="50" y1="75" x2="750" y2="75" stroke="#1F1F23" stroke-width="1"/>
  
  <!-- Grid of agents -->
  <g transform="translate(50, 95)">
    <!-- Agent 1 -->
    <rect width="150" height="80" rx="6" fill="#18181B" stroke="#06B6D4" stroke-width="1"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Planner Agent</text>
    <circle cx="130" cy="27" r="4" fill="#22C55E"/>
    <text x="20" y="55" font-family="monospace" font-size="9" fill="#888">TASK COMPILATION</text>
    <text x="20" y="68" font-family="monospace" font-size="9" fill="#06B6D4">STATE: ACTIVE</text>
  </g>
  
  <g transform="translate(225, 95)">
    <!-- Agent 2 -->
    <rect width="150" height="80" rx="6" fill="#18181B" stroke="#06B6D4" stroke-width="1"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Coding Agent</text>
    <circle cx="130" cy="27" r="4" fill="#22C55E"/>
    <text x="20" y="55" font-family="monospace" font-size="9" fill="#888">AST CODE MUTATIONS</text>
    <text x="20" y="68" font-family="monospace" font-size="9" fill="#06B6D4">STATE: ACTIVE</text>
  </g>

  <g transform="translate(400, 95)">
    <!-- Agent 3 -->
    <rect width="150" height="80" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Testing Agent</text>
    <circle cx="130" cy="27" r="4" fill="#A1A1AA"/>
    <text x="20" y="55" font-family="monospace" font-size="9" fill="#888">SANDBOX QA RUNNER</text>
    <text x="20" y="68" font-family="monospace" font-size="9" fill="#A1A1AA">STATE: STANDBY</text>
  </g>

  <g transform="translate(575, 95)">
    <!-- Agent 4 -->
    <rect width="150" height="80" rx="6" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Security Agent</text>
    <circle cx="130" cy="27" r="4" fill="#A1A1AA"/>
    <text x="20" y="55" font-family="monospace" font-size="9" fill="#888">KAVACHA AUDITING</text>
    <text x="20" y="68" font-family="monospace" font-size="9" fill="#A1A1AA">STATE: STANDBY</text>
  </g>

  <!-- Swarm Status -->
  <rect x="50" y="200" width="700" height="95" rx="6" fill="#141417" stroke="#1F1F23" stroke-width="1"/>
  <text x="70" y="225" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Swarm Coordination Layer Status</text>
  <text x="70" y="248" font-family="monospace" font-size="11" fill="#A1A1AA">Running isolated sub-agent sandboxes inside Node VM isolates.</text>
  <text x="70" y="268" font-family="monospace" font-size="11" fill="#06B6D4">Active sockets: 2/8. Ephemeral logs: Sync Nominal.</text>
</svg>