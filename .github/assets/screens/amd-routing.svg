<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <rect x="30" y="30" width="740" height="290" rx="8" fill="#0D0D11" stroke="#1F1F23" stroke-width="1.5"/>
  
  <text x="50" y="60" font-family="monospace" font-size="12" fill="#EF4444" font-weight="700">COMPUTE ROUTER SCHEDULER</text>
  <line x1="50" y1="75" x2="750" y2="75" stroke="#1F1F23" stroke-width="1"/>
  
  <!-- Left panel: AMD -->
  <g transform="translate(50, 95)">
    <rect width="320" height="195" rx="8" fill="#18181B" stroke="#EF4444" stroke-width="1.5"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">AMD Instinct MI300X</text>
    <rect x="20" y="45" width="80" height="18" rx="9" fill="#991B1B"/>
    <text x="60" y="57" font-family="monospace" font-size="9" fill="#FFF" text-anchor="middle">ROCm 7.2</text>
    
    <text x="20" y="95" font-family="monospace" font-size="11" fill="#888">GPU Utilization: 68%</text>
    <rect x="20" y="105" width="280" height="8" rx="4" fill="#0D0D11"/>
    <rect x="20" y="105" width="190" height="8" rx="4" fill="#EF4444"/>
    
    <text x="20" y="145" font-family="monospace" font-size="11" fill="#888">VRAM Allocation: 14.2 GB / 192 GB</text>
    <text x="20" y="175" font-family="system-ui, sans-serif" font-size="12" fill="#EF4444" font-weight="700">PRIMARY NODE ACTIVE</text>
  </g>
  
  <!-- Right panel: Fireworks -->
  <g transform="translate(430, 95)">
    <rect width="320" height="195" rx="8" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#A1A1AA">Fireworks Cloud API</text>
    <rect x="20" y="45" width="80" height="18" rx="9" fill="#27272A"/>
    <text x="60" y="57" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">STANDBY</text>
    
    <text x="20" y="95" font-family="monospace" font-size="11" fill="#666">Token Throughput: 18.7K/sec</text>
    <rect x="20" y="105" width="280" height="8" rx="4" fill="#0D0D11"/>
    <rect x="20" y="105" width="240" height="8" rx="4" fill="#444"/>
    
    <text x="20" y="145" font-family="monospace" font-size="11" fill="#666">Routing latency: 145ms</text>
    <text x="20" y="175" font-family="system-ui, sans-serif" font-size="12" fill="#888" font-weight="700">FAILOVER BACKUP</text>
  </g>
</svg>