    <text x="60" y="44" font-family="monospace" font-size="10" fill="#FBBF24" text-anchor="middle" font-weight="700">AST INDEXING</text>
  </g>

  <path d="M 350,140 L 390,140" stroke="#FBBF24" stroke-width="1.5"/>
  
  <g transform="translate(400, 110)">
