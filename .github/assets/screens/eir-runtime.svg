<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#070708" rx="12"/>
  <rect x="30" y="30" width="740" height="290" rx="8" fill="#0D0D11" stroke="#1F1F23" stroke-width="1.5"/>
  
