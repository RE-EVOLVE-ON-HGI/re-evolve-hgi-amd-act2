    <text x="60" y="44" font-family="monospace" font-size="10" fill="#FBBF24" text-anchor="middle" font-weight="700">PARSE SPEC</text>
  </g>
  
  <path d="M 180,140 L 220,140" stroke="#FBBF24" stroke-width="1.5" marker-end="url(#arrow)"/>
  
