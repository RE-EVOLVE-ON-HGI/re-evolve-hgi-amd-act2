<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0d1127"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="520" height="260" fill="url(#bg)" rx="12"/>
  <rect width="520" height="260" fill="none" stroke="#4f46e530" stroke-width="1" rx="12"/>

  <!-- Icon circle -->
  <circle cx="70" cy="80" r="38" fill="#4f46e520" stroke="#7c3aed50" stroke-width="1.5"/>
  <circle cx="70" cy="80" r="22" fill="#4f46e530" stroke="#7c3aed" stroke-width="1" filter="url(#glow)"/>
  <!-- Brain/network icon simplified -->
  <g transform="translate(58,68)" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round">
    <circle cx="6" cy="6" r="3"/>
    <circle cx="18" cy="6" r="3"/>
    <circle cx="12" cy="18" r="3"/>
    <line x1="9" y1="6" x2="15" y2="6"/>
    <line x1="7.5" y1="8.5" x2="10.5" y2="15.5"/>
    <line x1="16.5" y1="8.5" x2="13.5" y2="15.5"/>
  </g>

  <!-- Label -->
  <text x="120" y="68" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#7c3aed" font-weight="600" letter-spacing="2">COGNITIVE ORCHESTRATION</text>
  <text x="120" y="92" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#e2e8f0">CENSA</text>
  <text x="120" y="112" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#64748b">Cognitive Execution &amp; Neural Synthesis Agent</text>

  <!-- Divider -->
  <rect x="36" y="130" width="448" height="1" fill="#1e293b"/>

  <!-- Stats / Capabilities -->
  <text x="36" y="158" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#475569">CAPABILITIES</text>

  <rect x="36" y="168" width="130" height="60" rx="6" fill="#4f46e510" stroke="#4f46e530" stroke-width="1"/>
  <text x="101" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#a78bfa" text-anchor="middle">12</text>
  <text x="101" y="210" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#64748b" text-anchor="middle">Execution Stages</text>
  <text x="101" y="222" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#64748b" text-anchor="middle">per Goal</text>

  <rect x="178" y="168" width="130" height="60" rx="6" fill="#4f46e510" stroke="#4f46e530" stroke-width="1"/>
  <text x="243" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#a78bfa" text-anchor="middle">DAG</text>
  <text x="243" y="210" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#64748b" text-anchor="middle">Task Graph</text>
  <text x="243" y="222" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#64748b" text-anchor="middle">Planning</text>

  <rect x="320" y="168" width="165" height="60" rx="6" fill="#4f46e510" stroke="#4f46e530" stroke-width="1"/>
  <text x="402" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#a78bfa" text-anchor="middle">SVG</text>
  <text x="402" y="210" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#64748b" text-anchor="middle">Live Graph</text>
  <text x="402" y="222" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#64748b" text-anchor="middle">Visualization</text>

  <text x="484" y="252" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#1e293b" text-anchor="end">Re-Evolve on HGI</text>
</svg>
