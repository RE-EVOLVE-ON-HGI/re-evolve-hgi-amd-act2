<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="380" fill="url(#bg)" rx="12"/>
  <rect width="800" height="380" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <text x="400" y="36" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="3">REPOSITORY UNIVERSE</text>
  <text x="400" y="54" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#475569" text-anchor="middle">nextunicorn2026 Organization · Flagship Capabilities</text>

  <!-- Center: Re-Evolve HGI OS -->
  <circle cx="400" cy="210" r="52" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
