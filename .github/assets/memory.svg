<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#060a12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="520" height="260" fill="url(#bg)" rx="12"/>
  <rect width="520" height="260" fill="none" stroke="#06b6d430" stroke-width="1" rx="12"/>

  <circle cx="70" cy="80" r="38" fill="#06b6d420" stroke="#06b6d450" stroke-width="1.5"/>
  <circle cx="70" cy="80" r="22" fill="#06b6d430" stroke="#06b6d4" stroke-width="1" filter="url(#glow)"/>
