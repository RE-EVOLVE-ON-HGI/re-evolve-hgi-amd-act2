<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect width="800" height="200" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Flow line -->
  <rect x="24" y="98" width="752" height="4" rx="2" fill="#1e293b"/>
  <rect x="24" y="98" width="752" height="4" rx="2" fill="url(#flow)" opacity="0.6"/>

  <!-- Stage nodes -->
  <!-- Intent -->
  <circle cx="60" cy="100" r="18" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="60" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#60a5fa" text-anchor="middle">01</text>
  <text x="60" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Intent</text>
  <text x="60" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Parse</text>

  <!-- Planning -->
  <circle cx="160" cy="100" r="18" fill="#0f172a" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="160" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#818cf8" text-anchor="middle">02</text>
  <text x="160" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Planning</text>
  <text x="160" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">DAG</text>

  <!-- Reasoning -->
  <circle cx="260" cy="100" r="18" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow)"/>
  <text x="260" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#a78bfa" text-anchor="middle">03</text>
  <text x="260" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Reasoning</text>
  <text x="260" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Inference</text>

  <!-- Agents -->
  <circle cx="360" cy="100" r="22" fill="#3b82f615" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="360" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#60a5fa" text-anchor="middle">04</text>
  <text x="360" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">Agents</text>
  <text x="360" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Execute</text>

  <!-- Memory -->
  <circle cx="460" cy="100" r="18" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)"/>
  <text x="460" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#22d3ee" text-anchor="middle">05</text>
  <text x="460" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Memory</text>
  <text x="460" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Retrieve</text>

  <!-- Governance -->
  <circle cx="560" cy="100" r="18" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" filter="url(#glow)"/>
  <text x="560" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#f87171" text-anchor="middle">06</text>
  <text x="560" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Govern</text>
  <text x="560" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Kavacha</text>

  <!-- Execution -->
  <circle cx="660" cy="100" r="18" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="660" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#4ade80" text-anchor="middle">07</text>
  <text x="660" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Execute</text>
  <text x="660" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Panani X</text>

  <!-- Learning -->
  <circle cx="752" cy="100" r="18" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow)"/>
  <text x="752" y="104" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#fbbf24" text-anchor="middle">08</text>
  <text x="752" y="136" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Learn</text>
  <text x="752" y="150" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#475569" text-anchor="middle">Persist</text>

  <!-- Top label -->
  <text x="400" y="52" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="2">SYSTEM EXECUTION FLOW</text>
  <text x="400" y="68" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#334155" text-anchor="middle">Intent → Planning → Reasoning → Agents → Memory → Governance → Execution → Learning</text>

  <!-- Bottom -->
  <text x="400" y="185" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#1e293b" text-anchor="middle">Re-Evolve on HGI · Cognitive Execution Pipeline</text>
</svg>
