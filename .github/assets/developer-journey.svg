<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f630"/>
      <stop offset="50%" style="stop-color:#8b5cf680"/>
      <stop offset="100%" style="stop-color:#22c55e30"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="180" fill="url(#bg)" rx="12"/>
  <rect width="900" height="180" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="26" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="3">DEVELOPER JOURNEY</text>

  <!-- Journey line -->
  <rect x="50" y="90" width="800" height="3" rx="1" fill="url(#line)"/>

  <!-- Steps -->
  <!-- Install -->
  <circle cx="90" cy="91" r="20" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="90" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#60a5fa" text-anchor="middle">01</text>
  <text x="90" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#60a5fa" text-anchor="middle">npm</text>
  <text x="90" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Install</text>
  <text x="90" y="138" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">clone + deps</text>

  <!-- Run -->
  <circle cx="200" cy="91" r="20" fill="#0f172a" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="200" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#818cf8" text-anchor="middle">02</text>
  <text x="200" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#818cf8" text-anchor="middle">dev</text>
  <text x="200" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Run</text>
  <text x="200" y="138" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">npm run dev</text>

  <!-- CLI -->
  <circle cx="320" cy="91" r="20" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow)"/>
  <text x="320" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#a78bfa" text-anchor="middle">03</text>
  <text x="320" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#a78bfa" text-anchor="middle">CLI</text>
  <text x="320" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Control</text>
  <text x="320" y="138" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">hgi agent run</text>

  <!-- SDK -->
  <circle cx="450" cy="91" r="24" fill="#06b6d415" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#22d3ee" text-anchor="middle">04</text>
  <text x="450" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#22d3ee" text-anchor="middle">SDK</text>
  <text x="450" y="128" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">Build</text>
  <text x="450" y="143" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">Custom agents</text>

  <!-- API -->
  <circle cx="580" cy="91" r="20" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="580" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#4ade80" text-anchor="middle">05</text>
  <text x="580" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#4ade80" text-anchor="middle">API</text>
  <text x="580" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Integrate</text>
  <text x="580" y="138" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">REST + WS</text>

  <!-- Deploy -->
  <circle cx="700" cy="91" r="20" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow)"/>
  <text x="700" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#fbbf24" text-anchor="middle">06</text>
  <text x="700" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#fbbf24" text-anchor="middle">ship</text>
  <text x="700" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Deploy</text>
  <text x="700" y="138" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">Vercel + Railway</text>

  <!-- Scale -->
  <circle cx="820" cy="91" r="20" fill="#0f172a" stroke="#ec4899" stroke-width="1.5" filter="url(#glow)"/>
  <text x="820" y="88" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#f472b6" text-anchor="middle">07</text>
  <text x="820" y="98" font-family="ui-monospace,SFMono-Regular,monospace" font-size="7" fill="#f472b6" text-anchor="middle">AMD</text>
  <text x="820" y="124" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Scale</text>
  <text x="820" y="138" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">MI300X + ROCm</text>

  <!-- Top steps 1,3,5,7 above line -->
  <text x="90" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">≈30s</text>
  <text x="320" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">npm i -g @hgi/cli</text>
  <text x="580" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">POST /agent/run</text>
  <text x="820" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#334155" text-anchor="middle">AMD Fabric</text>

  <text x="450" y="168" font-family="ui-monospace,SFMono-Regular,monospace" font-size="8" fill="#1e293b" text-anchor="middle">Re-Evolve on HGI · Developer Journey</text>
</svg>
