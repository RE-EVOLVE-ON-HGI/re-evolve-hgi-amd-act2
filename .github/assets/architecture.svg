<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060912"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="l1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e3a5f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="3">ARCHITECTURE · 7-LAYER INTELLIGENCE STACK</text>
  <rect x="320" y="52" width="260" height="1" fill="url(#accent)"/>

  <!-- Layer 1 — Ingress -->
  <rect x="60" y="72" width="780" height="54" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <rect x="60" y="72" width="6" height="54" rx="3" fill="#3b82f6"/>
  <text x="85" y="95" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#60a5fa">LAYER 01</text>
  <text x="85" y="113" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Ingress / Developer Console</text>
  <text x="420" y="95" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#475569" text-anchor="middle">CLI · SDK · Next.js Mission Control · REST API</text>
  <text x="420" y="113" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#475569" text-anchor="middle">WebSocket Live Streams · Authentication · Rate Limiting</text>

  <!-- Arrow -->
  <line x1="450" y1="126" x2="450" y2="142" stroke="#3b82f650" stroke-width="2"/>
  <polygon points="444,138 450,148 456,138" fill="#3b82f650"/>

  <!-- Layer 2 — CENSA -->
  <rect x="60" y="150" width="780" height="54" rx="8" fill="#0f172a" stroke="#8b5cf640" stroke-width="1"/>
  <rect x="60" y="150" width="6" height="54" rx="3" fill="#8b5cf6"/>
  <text x="85" y="173" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#a78bfa">LAYER 02</text>
  <text x="85" y="191" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">CENSA — Cognitive Orchestrator</text>
  <text x="420" y="173" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#475569" text-anchor="middle">Intent Parsing · Task DAG Generation · 12-Stage Planner</text>
  <text x="420" y="191" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#475569" text-anchor="middle">Capability Matching · Confidence Scoring · SVG Graph Visualization</text>

  <!-- Arrow -->
  <line x1="450" y1="204" x2="450" y2="220" stroke="#8b5cf650" stroke-width="2"/>
  <polygon points="444,216 450,226 456,216" fill="#8b5cf650"/>

