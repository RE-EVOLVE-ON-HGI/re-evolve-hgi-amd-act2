apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: hgi-api, namespace: hgi }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: hgi-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
