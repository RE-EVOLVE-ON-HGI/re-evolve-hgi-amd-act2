apiVersion: apps/v1
kind: Deployment
metadata: { name: hgi-api, namespace: hgi }
spec:
  replicas: 3
  selector: { matchLabels: { app: hgi-api } }
  template:
    metadata: { labels: { app: hgi-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/hgi/hgi-backend:latest
          ports:
            - { containerPort: 4000, name: http }
            - { containerPort: 50051, name: grpc }
            - { containerPort: 9464, name: metrics }
          envFrom:
            - secretRef: { name: hgi-secrets }
          readinessProbe:
            httpGet: { path: /docs, port: 4000 }
            initialDelaySeconds: 15
          livenessProbe:
            httpGet: { path: /docs, port: 4000 }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
